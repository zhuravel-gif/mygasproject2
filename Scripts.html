<script>
// ============================================================
// Р“Р›РћР‘РђР›Р¬РќРћР• РЎРћРЎРўРћРЇРќРР•
// ============================================================
var STATE = {
  exportData: null,    // { headers, rows }
  calcResults: null,   // РјР°СЃСЃРёРІ СЂРµР·СѓР»СЊС‚Р°С‚РѕРІ
  flakons: [],         // РјР°СЃСЃРёРІ С„Р»Р°РєРѕРЅРѕРІ
  params: null,        // С‚РµРєСѓС‰РёРµ РїР°СЂР°РјРµС‚СЂС‹
  xlsxReady: false,    // SheetJS Р·Р°РіСЂСѓР¶РµРЅ
  importType: null,    // 'nomenclature' | 'cost' | 'price'
  importFileData: null, // { headers, rows } РёР· С„Р°Р№Р»Р°
  tables: {
    export: null,
    flakons: null,
    cost: null
  }
};

// РќР”РЎ/РџРѕС€Р»РёРЅР°: РѕС‡РµСЂРµРґСЊ РёР·РјРµРЅРµРЅРёР№ РґР»СЏ batch-СЃРѕС…СЂР°РЅРµРЅРёСЏ
var NDS_TAX_PENDING = {};
var NDS_TAX_TIMER = null;

// ============================================================
// РќРђР’РР“РђР¦РРЇ
// ============================================================
function showTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('tab-' + tabId).classList.add('active');
  var tabs = document.querySelectorAll('.nav-tab');
  var names = ['params','export','flakons','cost','calc','verify'];
  for (var i = 0; i < names.length; i++) {
    if (names[i] === tabId) tabs[i].classList.add('active');
  }
  if (tabId === 'params' && !STATE.params) loadParamsUI();
  if (tabId === 'flakons' && STATE.flakons.length === 0) loadFlakonsUI();
  if (tabId === 'calc') ensureFlakonsState(function() {
    populateCalcSelects();
    syncCalcParamsFromParams(STATE.params || getParamsFromUI());
  });
  if (tabId === 'verify') populateVerifySelect();
}

// ============================================================
// LOADING / STATUS
// ============================================================
function showLoading() { document.getElementById('loading').classList.add('active'); }
function hideLoading() { document.getElementById('loading').classList.remove('active'); }

function setStatus(id, msg, type) {
  var el = document.getElementById(id);
  if (el) { el.textContent = msg; el.className = 'status ' + (type || ''); }
}

function toggleImportGuide() {
  var guide = document.getElementById('import-guide');
  if (!guide) return;
  guide.classList.toggle('hidden');
}

function toggleFlakonGuide() {
  var guide = document.getElementById('flakon-guide');
  if (!guide) return;
  guide.classList.toggle('hidden');
}

function ensureFlakonsState(callback) {
  if (STATE.flakons && STATE.flakons.length) {
    if (callback) callback();
    return;
  }

  google.script.run
    .withSuccessHandler(function(flakons) {
      STATE.flakons = flakons || [];
      if (callback) callback();
    })
    .withFailureHandler(function() {
      if (callback) callback();
    })
    .getFlakonList();
}

function isKnownFlakonName(name) {
  var target = String(name || '').trim();
  if (!target || !STATE.flakons || !STATE.flakons.length) return false;
  for (var i = 0; i < STATE.flakons.length; i++) {
    if (String(STATE.flakons[i].name || '').trim() === target) return true;
  }
  return false;
}

function detectItemTypeForUI(row) {
  var name = String(row && row[0] || '').trim();
  var isSet = String(row && row[11] || '').trim();
  var hasRaw = row && row[7] && String(row[7]).trim() !== '';

  if (isKnownFlakonName(name)) return 'Р¤Р»Р°РєРѕРЅ';
  if (isSet === 'Р”Р°') return 'РќР°Р±РѕСЂС‹';
  if (!hasRaw) return 'Р“РѕС‚РѕРІС‹Р№ С‚РѕРІР°СЂ';
  return 'РЎС‹СЂСЊС‘';
}

function getTypeBadgeClass(type) {
  if (type === 'РЎС‹СЂСЊС‘') return 'badge-raw';
  if (type === 'Р“РѕС‚РѕРІС‹Р№ С‚РѕРІР°СЂ') return 'badge-finished';
  if (type === 'Р¤Р»Р°РєРѕРЅ') return 'badge-flakon';
  return 'badge-set';
}

// ============================================================
// XLSX LAZY LOAD
// ============================================================
function loadXLSX(callback) {
  if (typeof XLSX !== 'undefined') { STATE.xlsxReady = true; callback(); return; }
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = function() { STATE.xlsxReady = true; callback(); };
  s.onerror = function() { setStatus('export-status', 'РћС€РёР±РєР° Р·Р°РіСЂСѓР·РєРё XLSX Р±РёР±Р»РёРѕС‚РµРєРё. РџСЂРѕРІРµСЂСЊС‚Рµ РёРЅС‚РµСЂРЅРµС‚.', 'error'); };
  document.head.appendChild(s);
}

// ============================================================
// TAB 1 вЂ” IMPORT BUTTONS
// ============================================================
function startImport(type) {
  STATE.importType = type;
  loadXLSX(function() {
    var fi = document.getElementById('import-file-input');
    fi.value = '';
    fi.click();
  });
}

function handleImportFileSelected(event) {
  var input = event.target;
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  showLoading();
  setStatus('export-status', 'Р§РёС‚Р°СЋ С„Р°Р№Р» ' + file.name + '...', 'info');

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, { type: 'array', cellText: true, cellDates: false });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
      hideLoading();

      if (!rows || rows.length < 2) {
        setStatus('export-status', 'Р¤Р°Р№Р» РїСѓСЃС‚РѕР№ РёР»Рё СЃРѕРґРµСЂР¶РёС‚ РјРµРЅРµРµ 2 СЃС‚СЂРѕРє', 'error');
        return;
      }

      // РќРѕСЂРјР°Р»РёР·РѕРІР°С‚СЊ Р·Р°РіРѕР»РѕРІРєРё
      var headers = rows[0].map(function(h) { return String(h || '').trim(); });
      var dataRows = rows.slice(1).filter(function(r) {
        return r.some(function(c) { return String(c || '').trim() !== ''; });
      });

      STATE.importFileData = { headers: headers, rows: dataRows, fileName: file.name };
      showMappingModal(file.name, headers, dataRows.length);
    } catch(err) {
      hideLoading();
      setStatus('export-status', 'РћС€РёР±РєР° С‡С‚РµРЅРёСЏ С„Р°Р№Р»Р°: ' + err.message, 'error');
    }
  };
  reader.onerror = function() {
    hideLoading();
    setStatus('export-status', 'РћС€РёР±РєР° С‡С‚РµРЅРёСЏ С„Р°Р№Р»Р°', 'error');
  };
  reader.readAsArrayBuffer(file);
}

// ============================================================
// MAPPING MODAL
// ============================================================

// РџРѕР»СЏ РґР»СЏ РёРјРїРѕСЂС‚Р° РЅРѕРјРµРЅРєР»Р°С‚СѓСЂС‹ (14 Р±Р°Р·РѕРІС‹С… РєРѕР»РѕРЅРѕРє)
var NOMENCLATURE_FIELDS = [
  { key: 'NAME',    label: 'РќРѕРјРµРЅРєР»Р°С‚СѓСЂР° (РЅР°РёРјРµРЅРѕРІР°РЅРёРµ)', required: true,  hints: ['РЅРѕРјРµРЅРєР»Р°С‚СѓСЂР°', 'РЅР°РёРјРµРЅРѕРІР°РЅ', 'РёРјСЏ С‚РѕРІР°СЂР°'] },
  { key: 'ART',     label: 'РђСЂС‚РёРєСѓР»',                     required: false, hints: ['Р°СЂС‚РёРєСѓР»'] },
  { key: 'ART_WB',  label: 'РђСЂС‚РёРєСѓР» Р’Р‘',                  required: false, hints: ['РІР±', 'wildberries', 'Р°СЂС‚РёРєСѓР» РІР±'] },
  { key: 'CAT',     label: 'РљР°С‚РµРіРѕСЂРёСЏ С‚РѕРІР°СЂРѕРІ',            required: false, hints: ['РєР°С‚РµРіРѕСЂ'] },
  { key: 'VOL',     label: 'РћР±СЉС‘Рј С‚Р°СЂС‹',                   required: false, hints: ['РѕР±СЉРµРј', 'РѕР±СЉС‘Рј', 'С‚Р°СЂ', 'РѕР±СЉ'] },
  { key: 'GRP2',    label: 'РўРѕРІР°СЂРЅР°СЏ РіСЂСѓРїРїР° 2',            required: false, hints: ['РіСЂСѓРїРїР° 2', 'РіСЂСѓРїРїР°2', 'РіСЂСѓРїРїР°.2'] },
  { key: 'GRP3',    label: 'РўРѕРІР°СЂРЅР°СЏ РіСЂСѓРїРїР° 3',            required: false, hints: ['РіСЂСѓРїРїР° 3', 'РіСЂСѓРїРїР°3', 'РіСЂСѓРїРїР°.3'] },
  { key: 'RAW',     label: 'РћСЃРЅРѕРІРЅРѕРµ СЃС‹СЂСЊС‘',               required: false, hints: ['СЃС‹СЂСЊРµ', 'СЃС‹СЂСЊС‘', 'РѕСЃРЅРѕРІРЅРѕРµ СЃС‹СЂСЊРµ', 'РѕСЃРЅРѕРІРЅ'] },
  { key: 'FLAKON',  label: 'РўР°СЂР° (С„Р»Р°РєРѕРЅ)',                required: false, hints: ['С‚Р°СЂР°', 'С„Р»Р°РєРѕРЅ'] },
  { key: 'SET_QTY', label: 'РљРѕР»-РІРѕ РІ РЅР°Р±РѕСЂРµ',              required: false, hints: ['РєРѕР»-РІРѕ', 'РєРѕР»РёС‡РµСЃС‚РІРѕ', 'РЅР°Р±РѕСЂ', 'Р»Р°РєРѕРІ'] },
  { key: 'ART_MP',  label: 'РђСЂС‚РёРєСѓР» РњРџ',                   required: false, hints: ['Р°СЂС‚РёРєСѓР» РјРї', 'РјРї'] },
  { key: 'IS_SET',  label: 'Р­С‚Рѕ РЅР°Р±РѕСЂ',                    required: false, hints: ['СЌС‚Рѕ РЅР°Р±РѕСЂ', 'is_set', 'РЅР°Р±РѕСЂ'] },
  { key: 'WEIGHT',  label: 'Р’РµСЃ (РєРі)',                     required: false, hints: ['РІРµСЃ', 'РјР°СЃСЃР°', 'РёСЃРїРѕР»РЅ'] },
  { key: 'GRP1',    label: 'РўРѕРІР°СЂРЅР°СЏ РіСЂСѓРїРїР° 1',            required: false, hints: ['РіСЂСѓРїРїР° 1', 'РіСЂСѓРїРїР°1', 'РіСЂСѓРїРїР°.1'] }
];

// РџРѕСЂСЏРґРѕРє РїРѕР»РµР№ РїСЂРё Р·Р°РїРёСЃРё РІ 1cData
var FIELD_ORDER = ['NAME','ART','ART_WB','CAT','VOL','GRP2','GRP3','RAW','FLAKON','SET_QTY','ART_MP','IS_SET','WEIGHT','GRP1'];

function findBestMatch(hints, headers) {
  for (var h = 0; h < hints.length; h++) {
    var hint = hints[h].toLowerCase();
    for (var i = 0; i < headers.length; i++) {
      if (String(headers[i]).toLowerCase().indexOf(hint) >= 0) return i;
    }
  }
  return -1;
}

function colLabel(idx) {
  if (idx < 26) return String.fromCharCode(65 + idx);
  return String.fromCharCode(64 + Math.floor(idx / 26)) + String.fromCharCode(65 + (idx % 26));
}

function makeColOptions(headers, selected) {
  var opts = '<option value="-1">вЂ” РќРµ РёРјРїРѕСЂС‚РёСЂРѕРІР°С‚СЊ вЂ”</option>';
  for (var i = 0; i < headers.length; i++) {
    var label = colLabel(i) + ': ' + esc(String(headers[i]).substring(0, 45));
    opts += '<option value="' + i + '"' + (i === selected ? ' selected' : '') + '>' + label + '</option>';
  }
  return opts;
}

function showMappingModal(fileName, headers, rowCount) {
  var type = STATE.importType;
  var titleMap = {
    nomenclature: 'РРјРїРѕСЂС‚ РёР· 1РЎ РЅРѕРјРµРЅРєР»Р°С‚СѓСЂС‹',
    cost:         'РРјРїРѕСЂС‚ СЃРµР±РµСЃС‚РѕРёРјРѕСЃС‚Рё 1РЎ',
    supplier:     'РРјРїРѕСЂС‚ С†РµРЅС‹ РїРѕСЃС‚Р°РІС‰РёРєР°'
  };
  document.getElementById('import-modal-title').textContent = titleMap[type] || 'РњР°РїРїРёРЅРі СЃС‚РѕР»Р±С†РѕРІ';
  document.getElementById('import-modal-subtitle').textContent =
    fileName + ' В· ' + rowCount + ' СЃС‚СЂРѕРє РґР°РЅРЅС‹С…';

  var rateDefaults = (STATE.importSettings && STATE.importSettings.rateDefaults) || { nds: 0.22, tax: 0.065 };
  var ndsDefault = rateDefaults.nds;
  var taxDefault = rateDefaults.tax;

  var html = '';

  if (type === 'nomenclature') {
    html += '<p class="mapping-hint" style="margin-bottom:12px">РЎРѕРїРѕСЃС‚Р°РІСЊС‚Рµ СЃС‚РѕР»Р±С†С‹ С„Р°Р№Р»Р° СЃ РїРѕР»СЏРјРё С‚Р°Р±Р»РёС†С‹. РџРѕР»СЏ СЃРѕ * РѕР±СЏР·Р°С‚РµР»СЊРЅС‹.</p>';
    html += '<div class="mapping-scroll"><table class="mapping-table"><thead><tr><th>РџРѕР»Рµ С‚Р°Р±Р»РёС†С‹</th><th>РЎС‚РѕР»Р±РµС† С„Р°Р№Р»Р°</th></tr></thead><tbody>';

    for (var f = 0; f < NOMENCLATURE_FIELDS.length; f++) {
      var field = NOMENCLATURE_FIELDS[f];
      var best = findBestMatch(field.hints, headers);
      if (best < 0 && field.key === 'NAME') best = 0;

      html += '<tr>' +
        '<td class="map-field-name">' + esc(field.label) + (field.required ? ' <span class="required">*</span>' : '') + '</td>' +
        '<td><select id="map-' + field.key + '" class="mapping-select">' + makeColOptions(headers, best) + '</select></td>' +
        '</tr>';
    }

    html += '</tbody></table></div>';

    // РќР”РЎ/РџРѕС€Р»РёРЅР° defaults
    html += '<div class="mapping-defaults" style="margin-top:12px">' +
      '<div class="param-group"><label>РќР”РЎ РїРѕ СѓРјРѕР»С‡Р°РЅРёСЋ</label>' +
      '<input type="number" id="modal-nds" step="0.001" value="' + ndsDefault + '" style="width:100px"></div>' +
      '<div class="param-group"><label>РџРѕС€Р»РёРЅР° РїРѕ СѓРјРѕР»С‡Р°РЅРёСЋ</label>' +
      '<input type="number" id="modal-tax" step="0.001" value="' + taxDefault + '" style="width:100px"></div>' +
      '</div>';

  } else {
    // Cost or Supplier: РІС‹Р±СЂР°С‚СЊ 2 СЃС‚РѕР»Р±С†Р°
    var nameHints = ['РЅРѕРјРµРЅРєР»Р°С‚СѓСЂ', 'РЅР°РёРјРµРЅРѕРІР°РЅ', 'РёРјСЏ'];
    var valueHints = type === 'cost'
      ? ['СЃРµР±РµСЃС‚РѕРёРјРѕСЃС‚СЊ', 'СЃС‚РѕРёРјРѕСЃС‚СЊ', 'cost', 'С†РµРЅР°']
      : ['С†РµРЅР° РїРѕСЃС‚Р°РІС‰РёРєР°', 'С†РµРЅР°', 'price', 'СЃС‚РѕРёРјРѕСЃС‚СЊ'];

    var nameIdx  = findBestMatch(nameHints, headers);
    var valueIdx = findBestMatch(valueHints, headers);
    if (nameIdx < 0) nameIdx = 0;
    if (valueIdx < 0) valueIdx = Math.min(1, headers.length - 1);
    if (valueIdx === nameIdx && headers.length > 1) valueIdx = nameIdx === 0 ? 1 : 0;

    var valueLabel = type === 'cost' ? 'РЎРµР±РµСЃС‚РѕРёРјРѕСЃС‚СЊ 1РЎ' : 'Р¦РµРЅР° РїРѕСЃС‚Р°РІС‰РёРєР°';

    html += '<p class="mapping-hint" style="margin-bottom:12px">РЈРєР°Р¶РёС‚Рµ, РІ РєР°РєРёС… СЃС‚РѕР»Р±С†Р°С… РЅР°С…РѕРґСЏС‚СЃСЏ РЅР°РёРјРµРЅРѕРІР°РЅРёРµ Рё Р·РЅР°С‡РµРЅРёРµ.</p>';
    html += '<table class="mapping-table"><thead><tr><th>РџРѕР»Рµ</th><th>РЎС‚РѕР»Р±РµС† С„Р°Р№Р»Р°</th></tr></thead><tbody>';
    html += '<tr><td class="map-field-name">РќР°РёРјРµРЅРѕРІР°РЅРёРµ РЅРѕРјРµРЅРєР»Р°С‚СѓСЂС‹ <span class="required">*</span></td>' +
            '<td><select id="map-NAME" class="mapping-select">' + makeColOptions(headers, nameIdx) + '</select></td></tr>';
    html += '<tr><td class="map-field-name">' + esc(valueLabel) + ' <span class="required">*</span></td>' +
            '<td><select id="map-VALUE" class="mapping-select">' + makeColOptions(headers, valueIdx) + '</select></td></tr>';
    html += '</tbody></table>';
  }

  document.getElementById('import-mapping-grid').innerHTML = html;
  document.getElementById('import-modal').classList.add('active');
  document.body.classList.add('modal-open');
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('active');
  document.body.classList.remove('modal-open');
}

function confirmImport() {
  var type = STATE.importType;
  var fd   = STATE.importFileData;
  if (!fd) return;

  if (type === 'nomenclature') {
    // РЎРѕР±СЂР°С‚СЊ РјР°РїРїРёРЅРі
    var mapping = {};
    for (var f = 0; f < NOMENCLATURE_FIELDS.length; f++) {
      var key = NOMENCLATURE_FIELDS[f].key;
      var sel = document.getElementById('map-' + key);
      mapping[key] = sel ? parseInt(sel.value) : -1;
    }
    if (mapping.NAME < 0) {
      alert('РќРµРѕР±С…РѕРґРёРјРѕ РІС‹Р±СЂР°С‚СЊ СЃС‚РѕР»Р±РµС† СЃ РЅР°РёРјРµРЅРѕРІР°РЅРёРµРј РЅРѕРјРµРЅРєР»Р°С‚СѓСЂС‹.');
      return;
    }

    var nds = parseFloat(document.getElementById('modal-nds').value) || 0.22;
    var tax = parseFloat(document.getElementById('modal-tax').value) || 0.065;

    // РџРѕСЃС‚СЂРѕРёС‚СЊ РјР°СЃСЃРёРІ РґР°РЅРЅС‹С… РІ РїРѕСЂСЏРґРєРµ FIELD_ORDER
    var fieldLabels = FIELD_ORDER.map(function(k) {
      var fi = NOMENCLATURE_FIELDS.filter(function(x){ return x.key === k; })[0];
      return fi ? fi.label : k;
    });
    var exportRows = [fieldLabels];

    for (var i = 0; i < fd.rows.length; i++) {
      var srcRow = fd.rows[i];
      var nameVal = String(srcRow[mapping.NAME] || '').trim();
      if (!nameVal) continue; // РїСЂРѕРїСѓСЃС‚РёС‚СЊ РїСѓСЃС‚С‹Рµ СЃС‚СЂРѕРєРё
      var dstRow = FIELD_ORDER.map(function(k) {
        var idx = mapping[k];
        return (idx >= 0 && idx < srcRow.length) ? (srcRow[idx] || '') : '';
      });
      exportRows.push(dstRow);
    }

    if (exportRows.length < 2) {
      alert('РџРѕСЃР»Рµ С„РёР»СЊС‚СЂР°С†РёРё РЅРµ РѕСЃС‚Р°Р»РѕСЃСЊ РґР°РЅРЅС‹С… РґР»СЏ РёРјРїРѕСЂС‚Р°.');
      return;
    }

    closeImportModal();
    showLoading();
    setStatus('export-status', 'РРјРїРѕСЂС‚РёСЂСѓСЋ РЅРѕРјРµРЅРєР»Р°С‚СѓСЂСѓ (' + (exportRows.length - 1) + ' РїРѕР·РёС†РёР№)...', 'info');

    google.script.run
      .withSuccessHandler(function(res) {
        hideLoading();
        setStatus('export-status', res.success ? ('вњ“ ' + res.message) : ('вњ— ' + res.message),
                  res.success ? 'success' : 'error');
        if (res.success) loadExportData();
      })
      .withFailureHandler(function(err) {
        hideLoading();
        setStatus('export-status', 'РћС€РёР±РєР°: ' + err.message, 'error');
      })
      .importNomenclature(exportRows, nds, tax);

  } else {
    // cost РёР»Рё supplier
    var nameSel  = document.getElementById('map-NAME');
    var valueSel = document.getElementById('map-VALUE');
    if (!nameSel || !valueSel) return;

    var nameIdx  = parseInt(nameSel.value);
    var valueIdx = parseInt(valueSel.value);

    if (nameIdx < 0) { alert('РЈРєР°Р¶РёС‚Рµ СЃС‚РѕР»Р±РµС† СЃ РЅР°РёРјРµРЅРѕРІР°РЅРёРµРј.'); return; }

    var mappedData = [];
    for (var i = 0; i < fd.rows.length; i++) {

        .withSuccessHandler(function(res) {

        })

    } else {

        .withSuccessHandler(function(res) {
          hideLoading();
          setStatus('export-status', res.success ? ('вњ“ ' + res.message) : ('вњ— ' + res.message),
                    res.success ? 'success' : 'error');
          if (res.success) loadExportData();
        })
        .withFailureHandler(function(err) {
          hideLoading();
          setStatus('export-status', 'РћС€РёР±РєР°: ' + err.message, 'error');
        })
        .importSupplierPrice(mappedData);
    }
  }
}

function onNdsTaxChange(rowIdx, field, value) {
  if (!NDS_TAX_PENDING[rowIdx]) NDS_TAX_PENDING[rowIdx] = {};
  NDS_TAX_PENDING[rowIdx][field] = parseFloat(value) || 0;
  clearTimeout(NDS_TAX_TIMER);
  NDS_TAX_TIMER = setTimeout(flushNdsTaxUpdates, 1500);
}

function flushNdsTaxUpdates() {
  var updates = [];
  for (var rowIdx in NDS_TAX_PENDING) {
    var u = NDS_TAX_PENDING[rowIdx];
    updates.push({ row: parseInt(rowIdx), nds: u.nds, tax: u.tax });
  }
  NDS_TAX_PENDING = {};
  if (!updates.length) return;

  google.script.run
    .withSuccessHandler(function() {
      setStatus('export-status', 'вњ“ РќР”РЎ/РџРѕС€Р»РёРЅР° СЃРѕС…СЂР°РЅРµРЅС‹ (' + updates.length + ' СЃС‚СЂРѕРє)', 'success');
    })
    .withFailureHandler(function(err) {
      setStatus('export-status', 'РћС€РёР±РєР° СЃРѕС…СЂР°РЅРµРЅРёСЏ РќР”РЎ/РџРѕС€Р»РёРЅС‹: ' + err.message, 'error');
    })
    .updateNdsTax(updates);
}

var EXPORT_NDS_COL = 16;
var EXPORT_TAX_COL = 17;

function renderExportTable(data) {
  if (!data || !data.headers) return;
  var thead = document.getElementById('export-thead');
  var tbody = document.getElementById('export-tbody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  // Р—Р°РіРѕР»РѕРІРєРё вЂ” СЃРѕРєСЂР°С‰С‘РЅРЅС‹Рµ РґР»СЏ РґР»РёРЅРЅС‹С… СЃС‚СЂРѕРє
  for (var h = 0; h < data.headers.length; h++) {
    var th = document.createElement('th');
    var full = String(data.headers[h] || '');
    th.textContent = full.length > 22 ? full.substring(0, 20) + 'вЂ¦' : full;
    th.title = full;
    if (h === EXPORT_NDS_COL || h === EXPORT_TAX_COL) th.style.background = '#e8f5e9';
    thead.appendChild(th);
  }

  renderExportRows(data.rows);
}

function renderExportRows(rows) {
  var tbody = document.getElementById('export-tbody');
  tbody.innerHTML = '';
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var tr = document.createElement('tr');
    tr.setAttribute('data-name', (String(row[0] || '') + ' ' + String(row[1] || '')).toLowerCase());

    for (var j = 0; j < row.length; j++) {
      var td = document.createElement('td');

      if (j === EXPORT_NDS_COL || j === EXPORT_TAX_COL) {
        // Р РµРґР°РєС‚РёСЂСѓРµРјР°СЏ СЏС‡РµР№РєР°
        var field = j === EXPORT_NDS_COL ? 'nds' : 'tax';
        var inp = document.createElement('input');
        inp.type = 'number';
        inp.className = 'nds-tax-input';
        inp.step = '0.001';
        inp.value = parseFloat(row[j]) || 0;
        inp.setAttribute('data-row', i);
        inp.setAttribute('data-field', field);
        td.style.background = '#f1f8e9';
        td.style.padding = '2px 6px';
        // Р—Р°С…РІР°С‚С‹РІР°РµРј РїРµСЂРµРјРµРЅРЅС‹Рµ С‡РµСЂРµР· Р·Р°РјС‹РєР°РЅРёРµ
        (function(el, ri, fi) {
          el.addEventListener('change', function() { onNdsTaxChange(ri, fi, this.value); });
        })(inp, i, field);
        td.appendChild(inp);
      } else {
        var val = row[j];
        if (val !== null && val !== undefined && val !== '' && !isNaN(parseFloat(val)) && j > 0) {
          td.className = 'num';
          var num = parseFloat(val);
          td.textContent = num % 1 === 0 ? String(num) : num.toFixed(2);
        } else {
          td.textContent = val !== null && val !== undefined ? String(val) : '';
        }
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

function filterExportTable() {
  var query = document.getElementById('export-search').value.toLowerCase();
  var rows = document.querySelectorAll('#export-tbody tr');
  for (var i = 0; i < rows.length; i++) {
    var name = rows[i].getAttribute('data-name') || '';
    rows[i].style.display = (!query || name.indexOf(query) >= 0) ? '' : 'none';
  }
}

function renderExportStats(data) {
  if (!data || !data.rows) return;
  var total = data.rows.length;
  var types = { raw: 0, finished: 0, sets: 0 };
  var withCost = 0, withPrice = 0;
  data.rows.forEach(function(row) {
    var isSet = String(row[11] || '').trim();
    var hasRaw = row[7] && String(row[7]).trim() !== '';
    if (isSet === 'Р”Р°') types.sets++;
    else if (!hasRaw) types.finished++;
    else types.raw++;
    if (parseFloat(row[14]) > 0) withCost++;
    if (parseFloat(row[15]) > 0) withPrice++;
  });
  document.getElementById('export-stats').innerHTML =
    '<span class="stat-item"><span class="stat-dot" style="background:#1a73e8"></span>Р’СЃРµРіРѕ: ' + total + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#c5221f"></span>РЎС‹СЂСЊС‘: ' + types.raw + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#137333"></span>Р“РѕС‚РѕРІС‹Р№ С‚РѕРІР°СЂ: ' + types.finished + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#9e9e9e"></span>РќР°Р±РѕСЂС‹: ' + types.sets + '</span>' +
    '<span class="stat-item">|</span>' +
    '<span class="stat-item">РЎРµР±РµСЃ 1РЎ: <b>' + withCost + '</b></span>' +
    '<span class="stat-item">Р¦РµРЅР° РїРѕСЃС‚.: <b>' + withPrice + '</b></span>';
}

function exportCSV() {
  if (!STATE.exportData || !STATE.exportData.rows.length) {
    setStatus('export-status', 'РќРµС‚ РґР°РЅРЅС‹С… РґР»СЏ СЌРєСЃРїРѕСЂС‚Р°', 'error');
    return;
  }
  var csv = [STATE.exportData.headers.join(';')];
  STATE.exportData.rows.forEach(function(row) {
    csv.push(row.map(function(v) { return '"' + String(v || '').replace(/"/g, '""') + '"'; }).join(';'));
  });
  var blob = new Blob(['\uFEFF' + csv.join('\n')], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'export_1cData.csv'; a.click();
  URL.revokeObjectURL(url);
}

function getCostSearchQuery() {
  var input = document.getElementById('cost-search');
  return input ? String(input.value || '').toLowerCase().trim() : '';
}

function getCostSearchHaystack(result) {
  return [
    String(result.name || ''),
    String(result.flakonName || ''),
    String(result.category || ''),
    String(result.type || '')
  ].join(' ').toLowerCase();
}

function getCostRawValue(result, key) {
  if (!result) return null;
  if (key === 'diffPct') return result.cost1C > 0 ? result.diffPct : null;
  return result[key];
}

function getCostDisplayValue(result, key) {
  var directTextKeys = {
    name: true,
    flakonName: true,
    category: true,
    group1: true,
    group2: true,
    group3: true,
    rawName: true,
    type: true
  };
  if (directTextKeys[key]) return String(result[key] || '');
  if (key === 'diffPct') return result.cost1C > 0 ? (result.diffPct * 100).toFixed(1) + '%' : 'вЂ”';
  return fmt(result[key]);
}

function getCostFilterValue(result, key) {
  var display = getCostDisplayValue(result, key);
  return display === 'вЂ”' ? '' : String(display).trim();
}

function getCostSortIndicator(key) {
  if (STATE.costSort.key !== key) return ' в†•';
  return STATE.costSort.dir === 'asc' ? ' в†‘' : ' в†“';
}

function sanitizeCostFilters() {
  var valid = {};
  var results = STATE.calcResults || [];

  for (var i = 0; i < results.length; i++) {
    for (var j = 0; j < COST_SLICER_FIELDS.length; j++) {
      var slicer = COST_SLICER_FIELDS[j];
      var value = getCostFilterValue(results[i], slicer.key);
      if (!value) continue;
      if (!valid[slicer.key]) valid[slicer.key] = {};
      valid[slicer.key][value] = true;
    }
  }

  var next = {};
  for (var key in STATE.costFilters) {
    if (!STATE.costFilters.hasOwnProperty(key)) continue;
    var selected = STATE.costFilters[key];
    if (selected && valid[key] && valid[key][selected]) next[key] = selected;
  }
  STATE.costFilters = next;
}

function renderCostHeaders() {
  var thead = document.getElementById('cost-thead');
  if (!thead) return;
  thead.innerHTML = '';

  for (var i = 0; i < COST_COLUMNS.length; i++) {
    var col = COST_COLUMNS[i];
    var th = document.createElement('th');
    th.className = 'sortable-col';
    if (col.key === 'total') th.classList.add('col-total');
    th.textContent = col.label + getCostSortIndicator(col.key);
    th.setAttribute('data-key', col.key);
    th.addEventListener('click', function() {
      toggleCostSort(this.getAttribute('data-key'));
    });
    thead.appendChild(th);
  }
}

function buildCostSlicerDefs() {
  var results = STATE.calcResults || [];
  var defs = [];

  for (var i = 0; i < COST_SLICER_FIELDS.length; i++) {
    var col = COST_SLICER_FIELDS[i];
    var values = {};
    for (var j = 0; j < results.length; j++) {
      var value = getCostFilterValue(results[j], col.key);
      if (!value) continue;
      values[value] = true;
    }

    var options = Object.keys(values).sort(function(a, b) {
      var aNum = parseNumberV2(a);
      var bNum = parseNumberV2(b);
      if (col.numeric && aNum !== null && bNum !== null) return aNum - bNum;
      return a.localeCompare(b, 'ru', { sensitivity: 'base', numeric: true });
    });

    defs.push({
      key: col.key,
      label: col.label,
      options: options
    });
  }

  return defs;
}

function renderCostSlicers() {
  var host = document.getElementById('cost-slicers');
  if (!host) return;
  host.innerHTML = '';

  if (!STATE.calcResults || !STATE.calcResults.length) return;

  sanitizeCostFilters();
  var defs = buildCostSlicerDefs();
  for (var i = 0; i < defs.length; i++) {
    var def = defs[i];
    var wrap = document.createElement('div');
    wrap.className = 'export-slicer';

    var label = document.createElement('label');
    label.textContent = def.label;
    wrap.appendChild(label);

    var select = document.createElement('select');
    select.setAttribute('data-key', def.key);

    var allOpt = document.createElement('option');
    allOpt.value = '';
    allOpt.textContent = 'Р’СЃРµ Р·РЅР°С‡РµРЅРёСЏ';
    select.appendChild(allOpt);

    for (var j = 0; j < def.options.length; j++) {
      var opt = document.createElement('option');
      opt.value = def.options[j];
      opt.textContent = def.options[j];
      if (STATE.costFilters[def.key] === def.options[j]) opt.selected = true;
      select.appendChild(opt);
    }

    select.addEventListener('change', function() {
      var key = this.getAttribute('data-key');
      if (this.value) STATE.costFilters[key] = this.value;
      else delete STATE.costFilters[key];
      renderCostRows(getFilteredCostResults());
    });

    wrap.appendChild(select);
    host.appendChild(wrap);
  }
}

function compareCostResults(a, b, key) {
  var av = getCostRawValue(a, key);
  var bv = getCostRawValue(b, key);
  var aNum = parseNumberV2(av);
  var bNum = parseNumberV2(bv);

  if (aNum !== null && bNum !== null) return aNum - bNum;

  var aText = String(getCostDisplayValue(a, key) || '').trim();
  var bText = String(getCostDisplayValue(b, key) || '').trim();
  if (!aText && !bText) return 0;
  if (!aText) return 1;
  if (!bText) return -1;
  return aText.localeCompare(bText, 'ru', { sensitivity: 'base', numeric: true });
}

function toggleCostSort(key) {
  if (STATE.costSort.key === key) {
    STATE.costSort.dir = STATE.costSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.costSort.key = key;
    STATE.costSort.dir = 'asc';
  }
  renderCostTable();
}

function getFilteredCostResults() {
  if (!STATE.calcResults || !STATE.calcResults.length) return [];

  var query = getCostSearchQuery();
  var typeFilter = document.getElementById('cost-type-filter').value;
  var out = [];

  for (var i = 0; i < STATE.calcResults.length; i++) {
    var result = STATE.calcResults[i];
    if (query && getCostSearchHaystack(result).indexOf(query) < 0) continue;
    if (typeFilter && result.type !== typeFilter) continue;

    var matches = true;
    for (var key in STATE.costFilters) {
      if (!STATE.costFilters.hasOwnProperty(key)) continue;
      if (getCostFilterValue(result, key) !== STATE.costFilters[key]) {
        matches = false;
        break;
      }
    }
    if (matches) out.push(result);
  }

  if (STATE.costSort.key) {
    out.sort(function(a, b) {
      var cmp = compareCostResults(a, b, STATE.costSort.key);
      return STATE.costSort.dir === 'asc' ? cmp : -cmp;
    });
  }

  return out;
}

function renderCostRows(results) {
  var tbody = document.getElementById('cost-tbody');
  tbody.innerHTML = '';

  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    var diffClass = r.diff > 0 ? 'diff-pos' : (r.diff < 0 ? 'diff-neg' : 'diff-zero');
    var badgeClass = getTypeBadgeClass(r.type);
    var tr = document.createElement('tr');
    tr.setAttribute('data-type', r.type);
    tr.setAttribute('data-name', getCostSearchHaystack(r));

    for (var j = 0; j < COST_COLUMNS.length; j++) {
      var col = COST_COLUMNS[j];
      var td = document.createElement('td');

      if (col.key === 'name' || col.key === 'flakonName' || col.key === 'category') {
        td.textContent = r.name || '';
        if (col.key === 'flakonName') td.textContent = r.flakonName || '';
        if (col.key === 'category') td.textContent = r.category || '';
      } else if (col.key === 'type') {
        td.innerHTML = '<span class="badge ' + badgeClass + '">' + esc(r.type) + '</span>';
      } else {
        var rawValue = getCostRawValue(r, col.key);
        td.className = 'num';
        td.textContent = getCostDisplayValue(r, col.key);
        if (col.key === 'total') td.classList.add('col-total');
        if (col.key === 'diff' || col.key === 'diffPct') td.classList.add(diffClass);
        if (rawValue !== null && parseNumberV2(rawValue) === 0) td.classList.add('zero-value');
      }

      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  }
}

  var num = parseFloat(n);
  if (isNaN(num)) return 'вЂ”';

  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

}

function getSavedMappingV2(type) {
  if (!STATE.importSettings || !STATE.importSettings.mappings) return null;
  return STATE.importSettings.mappings[type] || null;
}

function normalizeKeyV2(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[._]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function isValidIndexV2(index, length) {
  return typeof index === 'number' && !isNaN(index) && index >= 0 && index < length;
}

function colLabelV2(index) {
  var n = index + 1;
  var out = '';
  while (n > 0) {
    var rem = (n - 1) % 26;
    out = String.fromCharCode(65 + rem) + out;
    n = Math.floor((n - 1) / 26);
  }
  return out;
}

function parseNumberV2(value) {
  if (value === null || value === undefined || value === '') return null;
  var parsed = parseFloat(String(value).replace(/\s+/g, '').replace(',', '.'));
  return isNaN(parsed) ? null : parsed;
}

function toNumberSafe(value, fallback) {
  var parsed = parseNumberV2(value);
  return parsed === null ? fallback : parsed;
}

function handleImportFileSelected(event) {
  var input = event.target;
  if (!input.files || !input.files[0] || !STATE.importCtx) return;
  var file = input.files[0];

  showLoading();
  setStatus('export-status', 'Р§РёС‚Р°СЋ С„Р°Р№Р»: ' + file.name + '...', 'info');

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), {
        type: 'array',
        raw: false,
        cellDates: false,
        codepage: 1251
      });
      if (!wb || !wb.SheetNames || wb.SheetNames.length === 0) {
        throw new Error('Р’ С„Р°Р№Р»Рµ РЅРµ РЅР°Р№РґРµРЅРѕ Р»РёСЃС‚РѕРІ.');
      }

      STATE.importCtx.workbook = wb;
      STATE.importCtx.fileName = file.name;
      STATE.importCtx.sheetName = wb.SheetNames[0];

      var saved = getSavedMappingV2(STATE.importCtx.type);
      if (saved && saved.sheetName) {
        for (var i = 0; i < wb.SheetNames.length; i++) {
          if (normalizeKeyV2(wb.SheetNames[i]) === normalizeKeyV2(saved.sheetName)) {
            STATE.importCtx.sheetName = wb.SheetNames[i];
            break;
          }
        }
      }

      openImportModalV2();
      hideLoading();
    } catch (err) {
      hideLoading();
      setStatus('export-status', 'РћС€РёР±РєР° С‡С‚РµРЅРёСЏ С„Р°Р№Р»Р°: ' + err.message, 'error');
    }
  };
  reader.onerror = function() {
    hideLoading();
    setStatus('export-status', 'РћС€РёР±РєР° С‡С‚РµРЅРёСЏ С„Р°Р№Р»Р°.', 'error');
  };
  reader.readAsArrayBuffer(file);
}

function openImportModalV2() {
  if (!STATE.importCtx || !STATE.importCtx.workbook) return;
  var cfg = IMPORT_CFG_V2[STATE.importCtx.type];

  document.getElementById('import-modal-title').textContent = cfg.title;
  document.getElementById('import-file-name').textContent = STATE.importCtx.fileName;

function refreshImportPreview() {
  if (!STATE.importCtx || !STATE.importCtx.workbook) return;

  STATE.importCtx.sheetName = document.getElementById('import-sheet-select').value;
  STATE.importCtx.headerRow = parseInt(document.getElementById('import-header-row').value, 10) || 1;
  if (STATE.importCtx.headerRow < 1) STATE.importCtx.headerRow = 1;

  var ws = STATE.importCtx.workbook.Sheets[STATE.importCtx.sheetName];
  if (!ws) return;
  var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
  if (!rows || rows.length === 0) rows = [[]];

  var headerIdx = STATE.importCtx.headerRow - 1;
  var rawHeaders = rows[headerIdx] || [];
  var headers = [];
  for (var i = 0; i < rawHeaders.length; i++) {
    headers.push(String(rawHeaders[i] || '').trim() || ('РљРѕР»РѕРЅРєР° ' + colLabelV2(i)));
  }
  STATE.importCtx.headers = headers;
  STATE.importCtx.dataRows = rows.slice(STATE.importCtx.headerRow).filter(function(row) {
    if (!row) return false;
    for (var j = 0; j < row.length; j++) {
      if (String(row[j] || '').trim() !== '') return true;
    }
    return false;
  });

  STATE.importCtx.mapping = buildMappingV2();
  renderMappingControlsV2();
  renderImportPreviewV2();

  document.getElementById('import-modal-subtitle').textContent =
    'Р¤Р°Р№Р»: ' + STATE.importCtx.fileName + ' В· Р›РёСЃС‚: ' + STATE.importCtx.sheetName +
    ' В· РЎС‚СЂРѕРє РґР°РЅРЅС‹С…: ' + STATE.importCtx.dataRows.length;
}

function buildMappingV2() {
  var cfg = IMPORT_CFG_V2[STATE.importCtx.type];
  var headers = STATE.importCtx.headers;
  var saved = getSavedMappingV2(STATE.importCtx.type);
  var current = {};

  for (var i = 0; i < cfg.fields.length; i++) {
    var key = cfg.fields[i].key;
    var sel = document.getElementById('map-' + key);
    if (sel) current[key] = parseInt(sel.value, 10);
  }

  var mapping = {};
  for (var f = 0; f < cfg.fields.length; f++) {
    var field = cfg.fields[f];
    var best = -1;
    if (isValidIndexV2(current[field.key], headers.length)) {
      best = current[field.key];
    } else if (saved && saved.fields && saved.fields[field.key]) {
      var savedField = saved.fields[field.key];
      if (savedField.header) {
        var targetHeader = normalizeKeyV2(savedField.header);
        for (var h = 0; h < headers.length; h++) {
          if (normalizeKeyV2(headers[h]) === targetHeader) { best = h; break; }
        }
      }
      if (best < 0 && isValidIndexV2(parseInt(savedField.index, 10), headers.length)) {
        best = parseInt(savedField.index, 10);
      }
    }
    if (best < 0) {
      for (var hintIdx = 0; hintIdx < field.hints.length; hintIdx++) {
        var hint = normalizeKeyV2(field.hints[hintIdx]);
        for (var j = 0; j < headers.length; j++) {
          if (normalizeKeyV2(headers[j]).indexOf(hint) >= 0) { best = j; break; }
        }
        if (best >= 0) break;
      }
    }
    mapping[field.key] = best;
  }
  return mapping;
}

      var srcRow = STATE.importCtx.dataRows[iRow];

      var article = isValidIndexV2(mapping.article, STATE.importCtx.headers.length) ? String(srcRow[mapping.article] || '').trim() : '';
      var value = isValidIndexV2(mapping.value, STATE.importCtx.headers.length) ? parseNumberV2(srcRow[mapping.value]) : null;

  closeImportModal();
  showLoading();
  setStatus('export-status', 'РРјРїРѕСЂС‚РёСЂСѓСЋ РґР°РЅРЅС‹Рµ...', 'info');

  var runner = google.script.run
    .withSuccessHandler(function(res) {
      hideLoading();
      if (!res || !res.success) {
        setStatus('export-status', (res && res.message) || 'РРјРїРѕСЂС‚ Р·Р°РІРµСЂС€РёР»СЃСЏ СЃ РѕС€РёР±РєРѕР№.', 'error');
        return;
      }
      STATE.importSettings = STATE.importSettings || { mappings: {}, rateDefaults: { nds: 0.22, tax: 0.065 } };
      STATE.importSettings.mappings[STATE.importCtx.type] = payload.mapping;
      if (STATE.importCtx.type === 'nomenclature') {
        STATE.importSettings.rateDefaults = { nds: payload.defaults.nds, tax: payload.defaults.tax };
      }
      var details = '';
      if (res.matchedByName !== undefined || res.matchedByArticle !== undefined) {
        details = ' (РїРѕ РЅР°РёРјРµРЅРѕРІР°РЅРёСЋ: ' + (res.matchedByName || 0) + ', РїРѕ Р°СЂС‚РёРєСѓР»Сѓ: ' + (res.matchedByArticle || 0) + ')';

  if (cfg.endpoint === 'importBaseNomenclature') runner.importBaseNomenclature(payload);

function buildMappingPayloadV2(mapping) {

      header: isValidIndexV2(idx, STATE.importCtx.headers.length) ? STATE.importCtx.headers[idx] : ''
    };
  }
  return {
    fileName: STATE.importCtx.fileName,
    sheetName: STATE.importCtx.sheetName,
    headerRow: STATE.importCtx.headerRow,
    fields: fields
  };
}

// IMPORT TAB OVERRIDES (V3)
// ============================================================
var EXPORT_SCHEMA_COLS = 18;
var EXPORT_STICKY_COLS = 4;
var EXPORT_PRICE_COL = 15;
var EXPORT_PRIORITY_ORDER = [0, 1, 2, 3, 13, 14, 15, 16, 17];
var EXPORT_SLICER_EXCLUDED = {
  0: true,   // РќРѕРјРµРЅРєР»Р°С‚СѓСЂР°
  1: true,   // РђСЂС‚РёРєСѓР»
  2: true,   // РђСЂС‚РёРєСѓР» Р’Р‘
  15: true   // Р¦РµРЅР° РїРѕСЃС‚Р°РІС‰РёРєР°
};
var EXPORT_NUMERIC_COLS = {
  4: true,   // РћР±СЉРµРј С‚Р°СЂС‹
  9: true,   // РљРѕР»РёС‡РµСЃС‚РІРѕ РІ РЅР°Р±РѕСЂРµ
  12: true,  // Р’РµСЃ
  14: true,  // РЎРµР±РµСЃС‚РѕРёРјРѕСЃС‚СЊ 1РЎ
  15: true   // Р¦РµРЅР° РїРѕСЃС‚Р°РІС‰РёРєР°
};

STATE.exportFilters = STATE.exportFilters || {};
STATE.exportSort = STATE.exportSort || { sourceCol: null, dir: 'asc' };

function getExportColCountV3(data) {
  if (!data || !data.headers) return 0;
  return Math.min(data.headers.length, EXPORT_SCHEMA_COLS);
}

function getExportDisplayOrderV3(data) {
  var colCount = getExportColCountV3(data);
  var order = [];
  var seen = {};

  for (var i = 0; i < EXPORT_PRIORITY_ORDER.length; i++) {
    var priorityCol = EXPORT_PRIORITY_ORDER[i];
    if (priorityCol < colCount && !seen[priorityCol]) {
      order.push(priorityCol);
      seen[priorityCol] = true;
    }
  }

  for (var c = 0; c < colCount; c++) {
    if (!seen[c]) order.push(c);
  }

  return order;
}

function getVisibleExportHeadersV3(data) {
  var headers = data && data.headers ? data.headers : [];
  var order = getExportDisplayOrderV3(data);
  var out = [];
  for (var i = 0; i < order.length; i++) {
    out.push(headers[order[i]]);
  }
  return out;
}

function getVisibleExportRowV3(row, data) {
  var out = [];
  var order = getExportDisplayOrderV3(data);
  for (var i = 0; i < order.length; i++) out.push(row[order[i]]);
  return out;
}

function normalizeExportValueV3(value) {
  if (value === null || value === undefined) return '';
  return String(value).trim();
}

function isFilterableExportColV3(index) {
  return !EXPORT_SLICER_EXCLUDED[index];
}

function getExportSearchQueryV3() {
  var input = document.getElementById('export-search');
  return input ? String(input.value || '').toLowerCase().trim() : '';
}

function getExportSearchHaystackV3(row) {
  return [
    normalizeExportValueV3(row[0]),
    normalizeExportValueV3(row[1]),
    normalizeExportValueV3(row[2])
  ].join(' ').toLowerCase();
}

function getSortIndicatorV3(sourceCol) {
  if (STATE.exportSort.sourceCol !== sourceCol) return ' в†•';
  return STATE.exportSort.dir === 'asc' ? ' в†‘' : ' в†“';
}

function applyExportStickyColumnsV3() {
  var headerCells = document.querySelectorAll('#export-thead th');
  if (!headerCells.length) return;

  var stickyCount = Math.min(EXPORT_STICKY_COLS, headerCells.length);
  var offsets = [];
  var left = 0;

  for (var i = 0; i < stickyCount; i++) {
    offsets.push(left);
    left += headerCells[i].offsetWidth;
  }

  for (var h = 0; h < stickyCount; h++) {
    headerCells[h].classList.add('sticky-col');
    headerCells[h].style.left = offsets[h] + 'px';
    headerCells[h].style.zIndex = String(10 - h);
  }

  var rows = document.querySelectorAll('#export-tbody tr');
  for (var r = 0; r < rows.length; r++) {
    var cells = rows[r].children;
    for (var c = 0; c < stickyCount && c < cells.length; c++) {
      cells[c].classList.add('sticky-col');
      cells[c].style.left = offsets[c] + 'px';
      cells[c].style.zIndex = '2';
    }
  }
}

function toggleExportSortV3(sourceCol) {
  if (STATE.exportSort.sourceCol === sourceCol) {
    STATE.exportSort.dir = STATE.exportSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.exportSort.sourceCol = sourceCol;
    STATE.exportSort.dir = 'asc';
  }
  renderExportTable(STATE.exportData);
}

function compareExportValuesV3(a, b, sourceCol) {
  var av = a.row[sourceCol];
  var bv = b.row[sourceCol];
  var aText = normalizeExportValueV3(av);
  var bText = normalizeExportValueV3(bv);
  var aNum = parseNumberV2(av);
  var bNum = parseNumberV2(bv);

  if (aText === '' && bText === '') return 0;
  if (aText === '') return 1;
  if (bText === '') return -1;

  if (EXPORT_NUMERIC_COLS[sourceCol] || sourceCol === EXPORT_NDS_COL || sourceCol === EXPORT_TAX_COL) {
    if (aNum !== null && bNum !== null) return aNum - bNum;
  }

  return aText.localeCompare(bText, 'ru', { sensitivity: 'base', numeric: true });
}

function sanitizeExportFiltersV3(data) {
  var rows = data && data.rows ? data.rows : [];
  var valid = {};

  for (var i = 0; i < rows.length; i++) {
    var row = getVisibleExportRowV3(rows[i], data);
    var order = getExportDisplayOrderV3(data);
    for (var c = 0; c < order.length; c++) {
      if (!isFilterableExportColV3(order[c])) continue;
      var key = normalizeExportValueV3(row[c]);
      if (!key) continue;
      if (!valid[c]) valid[c] = {};
      valid[c][key] = true;
    }
  }

  var next = {};
  for (var filterCol in STATE.exportFilters) {
    if (!STATE.exportFilters.hasOwnProperty(filterCol)) continue;
    var value = STATE.exportFilters[filterCol];
    if (!value) continue;
    if (valid[filterCol] && valid[filterCol][value]) next[filterCol] = value;
  }
  STATE.exportFilters = next;
}

function buildExportSlicerDefsV3(data) {
  var headers = getVisibleExportHeadersV3(data);
  var rows = data && data.rows ? data.rows : [];
  var order = getExportDisplayOrderV3(data);
  var defs = [];

  for (var c = 0; c < headers.length; c++) {
    if (!isFilterableExportColV3(order[c])) continue;
    var values = {};
    for (var r = 0; r < rows.length; r++) {
      var value = normalizeExportValueV3(rows[r][order[c]]);
      if (!value) continue;
      values[value] = true;
    }

    var options = Object.keys(values).sort(function(a, b) {
      return a.localeCompare(b, 'ru', { sensitivity: 'base', numeric: true });
    });

    defs.push({
      index: c,
      label: headers[c],
      options: options
    });
  }

  return defs;
}

function renderExportSlicersV3(data) {
  var host = document.getElementById('export-slicers');
  if (!host) return;
  host.innerHTML = '';

  if (!data || !data.rows || data.rows.length === 0) return;

  sanitizeExportFiltersV3(data);
  var defs = buildExportSlicerDefsV3(data);
  if (!defs.length) return;

  for (var i = 0; i < defs.length; i++) {
    var def = defs[i];
    var wrap = document.createElement('div');
    wrap.className = 'export-slicer';

    var label = document.createElement('label');
    label.textContent = def.label;
    wrap.appendChild(label);

    var select = document.createElement('select');
    select.setAttribute('data-col', def.index);

    var allOpt = document.createElement('option');
    allOpt.value = '';
    allOpt.textContent = 'Р’СЃРµ Р·РЅР°С‡РµРЅРёСЏ';
    select.appendChild(allOpt);

    for (var j = 0; j < def.options.length; j++) {
      var opt = document.createElement('option');
      opt.value = def.options[j];
      opt.textContent = def.options[j];
      if (STATE.exportFilters[String(def.index)] === def.options[j]) opt.selected = true;
      select.appendChild(opt);
    }

    select.addEventListener('change', function() {
      var colIndex = String(this.getAttribute('data-col'));
      if (this.value) STATE.exportFilters[colIndex] = this.value;
      else delete STATE.exportFilters[colIndex];
      renderExportRows(getFilteredExportEntriesV3());
    });

    wrap.appendChild(select);
    host.appendChild(wrap);
  }
}

function getFilteredExportEntriesV3() {
  if (!STATE.exportData || !STATE.exportData.rows) return [];

  var rows = STATE.exportData.rows;
  var query = getExportSearchQueryV3();
  var entries = [];

  for (var i = 0; i < rows.length; i++) {
    var visibleRow = getVisibleExportRowV3(rows[i], STATE.exportData);
    if (query && getExportSearchHaystackV3(visibleRow).indexOf(query) < 0) continue;

    var matches = true;
    for (var filterCol in STATE.exportFilters) {
      if (!STATE.exportFilters.hasOwnProperty(filterCol)) continue;
      var filterValue = STATE.exportFilters[filterCol];
      if (!filterValue) continue;
      if (normalizeExportValueV3(visibleRow[parseInt(filterCol, 10)]) !== filterValue) {
        matches = false;
        break;
      }
    }
    if (!matches) continue;

    entries.push({
      index: i,
      row: rows[i],
      visibleRow: visibleRow
    });
  }

  if (STATE.exportSort.sourceCol !== null && STATE.exportSort.sourceCol !== undefined) {
    entries.sort(function(a, b) {
      var result = compareExportValuesV3(a, b, STATE.exportSort.sourceCol);
      return STATE.exportSort.dir === 'asc' ? result : -result;
    });
  }

  return entries;
}

function renderExportTable(data) {
  if (!data || !data.headers) return;

  STATE.exportData = data;
  sanitizeExportFiltersV3(data);

  var headers = getVisibleExportHeadersV3(data);
  var order = getExportDisplayOrderV3(data);
  var thead = document.getElementById('export-thead');
  var tbody = document.getElementById('export-tbody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  for (var h = 0; h < headers.length; h++) {
    var sourceCol = order[h];
    var th = document.createElement('th');
    var full = String(headers[h] || '');
    th.className = 'sortable-col';
    th.textContent = (full.length > 30 ? full.substring(0, 28) + '...' : full) + getSortIndicatorV3(sourceCol);
    th.title = full;
    th.setAttribute('data-source-col', sourceCol);
    th.addEventListener('click', function() {
      toggleExportSortV3(parseInt(this.getAttribute('data-source-col'), 10));
    });
    if (sourceCol === EXPORT_PRICE_COL) th.style.background = '#fff4e5';
    if (sourceCol === EXPORT_NDS_COL || sourceCol === EXPORT_TAX_COL) th.style.background = '#e8f5e9';
    thead.appendChild(th);
  }

  renderExportSlicersV3(data);
  renderExportRows(getFilteredExportEntriesV3());
  applyExportStickyColumnsV3();
}

function renderExportRows(entries) {
  var tbody = document.getElementById('export-tbody');
  tbody.innerHTML = '';

  for (var i = 0; i < entries.length; i++) {
    var entry = entries[i];
    var row = entry.row;
    var visibleRow = entry.visibleRow;
    var order = getExportDisplayOrderV3(STATE.exportData);
    var originalIndex = entry.index;
    var tr = document.createElement('tr');
    tr.setAttribute('data-name', getExportSearchHaystackV3(visibleRow));

    for (var j = 0; j < visibleRow.length; j++) {

function numberEditorFactory_(step, className) {
  return function(cell, onRendered, success, cancel) {
    var input = document.createElement('input');
    input.type = 'number';
    input.step = step || '0.01';
    input.className = className || '';
    input.value = cell.getValue() === null || cell.getValue() === undefined ? '' : String(cell.getValue());

    onRendered(function() {
      input.focus();
      input.select();
    });

    function commit() {
      success(input.value === '' ? '' : input.value);
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') cancel();
    });
    input.addEventListener('blur', commit);
    return input;
  };
}

function formatNumberCell_(cell, bold) {
  var value = cell.getValue();
  var parsed = parseNumberV2(value);
  var el = cell.getElement();
  el.classList.add('num-cell');
  el.classList.remove('zero-value');
  if (parsed === null) return esc(normalizeExportValueV3(value));
  if (parsed === 0) el.classList.add('zero-value');
  var text = parsed % 1 === 0 ? String(parsed) : parsed.toFixed(2);
  return bold ? '<b>' + text + '</b>' : text;
}

function formatCostCell_(cell, columnKey) {
  var row = cell.getRow().getData();
  var el = cell.getElement();
  el.classList.remove('num-cell', 'zero-value', 'col-total', 'diff-pos', 'diff-neg', 'diff-zero');

  if (columnKey === 'type') {
    return '<span class="badge ' + getTypeBadgeClass(row.type) + '">' + esc(row.type || '') + '</span>';
  }

  if (columnKey === 'name' || columnKey === 'flakonName' || columnKey === 'category') {
    return esc(String(row[columnKey] || ''));
  }

  el.classList.add('num-cell');
  if (columnKey === 'total') el.classList.add('col-total');
  if (columnKey === 'diff' || columnKey === 'diffPct') {
    if (row.diff > 0) el.classList.add('diff-pos');
    else if (row.diff < 0) el.classList.add('diff-neg');
    else el.classList.add('diff-zero');
  }
  var rawValue = getCostRawValue(row, columnKey);
  if (rawValue !== null && parseNumberV2(rawValue) === 0) el.classList.add('zero-value');
  return esc(getCostDisplayValue(row, columnKey));
}

function exportFieldName_(sourceCol) {
  return 'c_' + sourceCol;
}

function buildExportGridRows_(data) {
  var rows = data && data.rows ? data.rows : [];
  var order = getExportDisplayOrderV3(data);
  var out = [];

  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var item = {
      _rowIndex: i,
      _search: getExportSearchHaystackV3(row)
    };
    for (var j = 0; j < order.length; j++) {
      var sourceCol = order[j];
      item[exportFieldName_(sourceCol)] = row[sourceCol];
    }
    out.push(item);
  }
  return out;
}

function buildExportGridColumns_(data) {
  var headers = getVisibleExportHeadersV3(data);
  var order = getExportDisplayOrderV3(data);
  var columns = [];

  for (var i = 0; i < headers.length; i++) {
    (function(visibleIndex, sourceCol, title) {
      var isEditable = sourceCol === EXPORT_PRICE_COL || sourceCol === EXPORT_NDS_COL || sourceCol === EXPORT_TAX_COL;
      var isNumeric = !!EXPORT_NUMERIC_COLS[sourceCol] || sourceCol === EXPORT_PRICE_COL || sourceCol === EXPORT_NDS_COL || sourceCol === EXPORT_TAX_COL;
      var fieldName = exportFieldName_(sourceCol);

      columns.push({
        title: String(title || ''),
        field: fieldName,
        headerTooltip: String(title || ''),
        frozen: visibleIndex < EXPORT_STICKY_COLS,
        sorter: isNumeric ? 'number' : 'string',
        hozAlign: isNumeric ? 'right' : 'left',
        minWidth: visibleIndex < 3 ? 160 : 120,
        editor: isEditable ? numberEditorFactory_(sourceCol === EXPORT_PRICE_COL ? '0.01' : '0.001', 'rate-input nds-tax-input') : false,
        formatter: function(cell) {
          var el = cell.getElement();
          el.classList.remove('num-cell', 'zero-value');
          if (isNumeric) return formatNumberCell_(cell, false);
          return esc(normalizeExportValueV3(cell.getValue()));
        },
        cellEdited: isEditable ? function(cell) {
          var rowIndex = cell.getRow().getData()._rowIndex;
          var value = cell.getValue();
          if (STATE.exportData && STATE.exportData.rows && STATE.exportData.rows[rowIndex]) {
            STATE.exportData.rows[rowIndex][sourceCol] = value;
          }
          if (sourceCol === EXPORT_PRICE_COL) onNdsTaxChange(rowIndex, 'supplierPrice', value);
          if (sourceCol === EXPORT_NDS_COL) onNdsTaxChange(rowIndex, 'nds', value);
          if (sourceCol === EXPORT_TAX_COL) onNdsTaxChange(rowIndex, 'tax', value);
        } : null
      });
    })(i, order[i], headers[i]);
  }

  return columns;
}

function applyExportFiltersTabulator_() {
  if (!STATE.tables.export || !STATE.exportData) return;

  var query = getExportSearchQueryV3();
  var order = getExportDisplayOrderV3(STATE.exportData);

  STATE.tables.export.setFilter(function(data) {
    if (query && String(data._search || '').indexOf(query) < 0) return false;

    for (var filterCol in STATE.exportFilters) {
      if (!STATE.exportFilters.hasOwnProperty(filterCol)) continue;
      var value = STATE.exportFilters[filterCol];
      if (!value) continue;
      var sourceCol = order[parseInt(filterCol, 10)];
      var fieldName = exportFieldName_(sourceCol);
      if (normalizeExportValueV3(data[fieldName]) !== value) return false;
    }
    return true;
  });
}

    var allOpt = document.createElement('option');
    allOpt.value = '';
    allOpt.textContent = 'Все значения';
    select.appendChild(allOpt);

    for (var j = 0; j < def.options.length; j++) {
      var opt = document.createElement('option');

      opt.textContent = def.options[j];
      if (STATE.exportFilters[String(def.index)] === def.options[j]) opt.selected = true;

    select.addEventListener('change', function() {
      var colIndex = String(this.getAttribute('data-col'));
      if (this.value) STATE.exportFilters[colIndex] = this.value;
      else delete STATE.exportFilters[colIndex];
      applyExportFiltersTabulator_();

    wrap.appendChild(select);
    host.appendChild(wrap);

  }

  if (STATE.tables.cost && typeof STATE.tables.cost.download === 'function') {
    STATE.tables.cost.download('xlsx', 'cost_results.xlsx', { sheetName: 'Себестоимость' });
    return;
  }

  loadXLSX(function() {
    var rows = [];
    var headers = [];

    for (var i = 0; i < COST_COLUMNS.length; i++) headers.push(COST_COLUMNS[i].label);
    rows.push(headers);

    for (var j = 0; j < STATE.calcResults.length; j++) {
      var r = STATE.calcResults[j];
      var row = [];
      for (var k = 0; k < COST_COLUMNS.length; k++) {
        var key = COST_COLUMNS[k].key;
        if (key === 'diffPct') row.push(r.cost1C > 0 ? r.diffPct : '');
        else row.push(getCostRawValue(r, key));
      }
      rows.push(row);
    }

    var wb = XLSX.utils.book_new();
    var ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Себестоимость');
    XLSX.writeFile(wb, 'cost_results.xlsx');
  });
}

window.addEventListener('resize', function() {
  redrawTable_('export');
  redrawTable_('flakons');
  redrawTable_('cost');
});
</script>
