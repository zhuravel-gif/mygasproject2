function confirmImport() {
  if (!STATE.importCtx) return;
  var cfg = IMPORT_CFG_V2[STATE.importCtx.type];
  var mapping = {};
  for (var i = 0; i < cfg.fields.length; i++) {
    var key = cfg.fields[i].key;
    var sel = document.getElementById('map-' + key);
    mapping[key] = sel ? parseInt(sel.value, 10) : -1;
  }

  for (var req = 0; req < cfg.fields.length; req++) {
    if (cfg.fields[req].required && !isValidIndexV2(mapping[cfg.fields[req].key], STATE.importCtx.headers.length)) {
      showAlert('Внимание', 'Не заполнено обязательное поле: ' + cfg.fields[req].label);
      return;
    }
  }
  if ((STATE.importCtx.type === 'cost' || STATE.importCtx.type === 'supplier') &&
      !isValidIndexV2(mapping.name, STATE.importCtx.headers.length) &&
      !isValidIndexV2(mapping.article, STATE.importCtx.headers.length)) {
    showAlert('Внимание', 'Для сопоставления укажите колонку Номенклатура или Артикул.');
    return;
  }

  var payload;
  if (STATE.importCtx.type === 'nomenclature') {
    var rows = [];
    for (var r = 0; r < STATE.importCtx.dataRows.length; r++) {
      var src = STATE.importCtx.dataRows[r];
      var item = {};
      for (var f = 0; f < cfg.fields.length; f++) {
        var field = cfg.fields[f];
        var idx = mapping[field.key];
        item[field.key] = isValidIndexV2(idx, STATE.importCtx.headers.length) ? String(src[idx] || '').trim() : '';
      }
      if (!item.name) continue;
      rows.push(item);
    }
    if (!rows.length) {
      showAlert('Внимание', 'После фильтрации не осталось строк с номенклатурой.');
      return;
    }
    payload = {
      rows: rows,
      defaults: {
        nds: toNumberSafe(document.getElementById('import-default-nds').value, 0.22),
        tax: toNumberSafe(document.getElementById('import-default-tax').value, 0.065)
      },
      mapping: buildMappingPayloadV2(mapping)
    };
  } else if (STATE.importCtx.type === 'bundles') {
    var bundleRows = [];
    for (var b = 0; b < STATE.importCtx.dataRows.length; b++) {
      var bundleSrc = STATE.importCtx.dataRows[b];
      var component = isValidIndexV2(mapping.component, STATE.importCtx.headers.length) ? String(bundleSrc[mapping.component] || '').trim() : '';
      var bundle = isValidIndexV2(mapping.bundle, STATE.importCtx.headers.length) ? String(bundleSrc[mapping.bundle] || '').trim() : '';
      var specification = isValidIndexV2(mapping.specification, STATE.importCtx.headers.length) ? String(bundleSrc[mapping.specification] || '').trim() : '';
      var quantity = isValidIndexV2(mapping.quantity, STATE.importCtx.headers.length) ? parseNumberV2(bundleSrc[mapping.quantity]) : null;
      if (!component || !bundle || !specification) continue;
      bundleRows.push({
        component: component,
        bundle: bundle,
        specification: specification,
        quantity: quantity === null ? 1 : quantity
      });
    }
    if (!bundleRows.length) {
      showAlert('Внимание', 'Не найдено валидных строк комплектаций наборов.');
      return;
    }
    payload = {
      rows: bundleRows,
      mapping: buildMappingPayloadV2(mapping)
    };
  } else {
    var mappedRows = [];
    for (var iRow = 0; iRow < STATE.importCtx.dataRows.length; iRow++) {
      var srcRow = STATE.importCtx.dataRows[iRow];
      var name = isValidIndexV2(mapping.name, STATE.importCtx.headers.length) ? String(srcRow[mapping.name] || '').trim() : '';
      var article = isValidIndexV2(mapping.article, STATE.importCtx.headers.length) ? String(srcRow[mapping.article] || '').trim() : '';
      var value = isValidIndexV2(mapping.value, STATE.importCtx.headers.length) ? parseNumberV2(srcRow[mapping.value]) : null;
      if (!name && !article) continue;
      if (value === null) continue;
      mappedRows.push({ name: name, article: article, value: value });
    }
    if (!mappedRows.length) {
      showAlert('Внимание', 'Не найдено валидных строк для импорта.');
      return;
    }
    payload = {
      rows: mappedRows,
      mapping: buildMappingPayloadV2(mapping)
    };
  }

  closeImportModal();
  showLoading();
  setStatus('export-status', 'Импортирую данные...', 'info');

  var runner = google.script.run
    .withSuccessHandler(function(res) {
      hideLoading();
      if (!res || !res.success) {
        setStatus('export-status', (res && res.message) || 'Импорт завершился с ошибкой.', 'error');
        return;
      }
      STATE.importSettings = STATE.importSettings || { mappings: {}, rateDefaults: { nds: 0.22, tax: 0.065 } };
      STATE.importSettings.mappings[STATE.importCtx.type] = payload.mapping;
      if (STATE.importCtx.type === 'nomenclature') {
        STATE.importSettings.rateDefaults = { nds: payload.defaults.nds, tax: payload.defaults.tax };
      }
      var details = '';
      if (res.matchedByName !== undefined || res.matchedByArticle !== undefined) {
        details = ' (по наименованию: ' + (res.matchedByName || 0) + ', по артикулу: ' + (res.matchedByArticle || 0) + ')';
      }
      setStatus('export-status', res.message + details, 'success');
      loadExportData();
      if (STATE.importCtx.type === 'bundles') loadBundlesUI();
    })
    .withFailureHandler(function(err) {
      hideLoading();
      setStatus('export-status', 'Ошибка импорта: ' + err.message, 'error');
    });

  if (cfg.endpoint === 'importBaseNomenclature') runner.importBaseNomenclature(payload);
  if (cfg.endpoint === 'importCurrentCost') runner.importCurrentCost(payload);
  if (cfg.endpoint === 'importSupplierPriceData') runner.importSupplierPriceData(payload);
  if (cfg.endpoint === 'importBundleCompositions') runner.importBundleCompositions(payload);
}

function renderBundleSpecTable(bundles) {

  }

    var columns = [
      { title: 'Набор', field: 'bundle', frozen: true, headerFilter: 'input', minWidth: 160 },
      {
        title: 'Статус', field: 'status', headerFilter: 'list',

        formatter: function(cell) {
          var v = cell.getValue();
          if (v === 'Без комплектации') return '<span class="badge badge-raw">' + v + '</span>';
          if (v === 'С комплектацией') return '<span class="badge badge-finished">' + v + '</span>';
          return '<span class="badge">' + v + '</span>';
        }
      },
      { title: 'Строк состава', field: 'compositionRows', hozAlign: 'right', formatter: fmtNumber, formatterParams: { decimals: 0 } },
      { title: 'Спецификаций', field: 'specCount', hozAlign: 'right', formatter: fmtNumber, formatterParams: { decimals: 0 } },
      {
        title: 'Активная спецификация', field: 'activeSpec', minWidth: 200,
        formatter: function(cell) {
          var row = cell.getRow().getData();
          if (!row.matched || !row.specs || !row.specs.length) {
            return '<span class="bundle-missing-chip">Нет комплектации</span>';
          }
          var html = '<select class="bundle-spec-select" data-bundle="' + esc(row.bundle) + '">';
          for (var i = 0; i < row.specs.length; i++) {
            var sel = row.activeSpec === row.specs[i] ? ' selected' : '';
            html += '<option value="' + esc(row.specs[i]) + '"' + sel + '>' + esc(row.specs[i]) + '</option>';
          }
          html += '</select>';
          return html;
        }
      }
    ];

    STATE.tables.bundleSpec = createTable('bundle-spec-container', columns, specData, {
      height: '40vh',
      initialSort: [{ column: 'bundle', dir: 'asc' }],
      rowFormatter: function(row) {
        if (!row.getData().matched) {
          row.getElement().style.opacity = '0.6';
        }
      }
    });

    var container = document.getElementById('bundle-spec-container');
    if (!container) return;
    container.innerHTML = '<table class="data-table"><thead><tr>' +
      '<th>Набор</th><th>Статус</th><th>Строк состава</th><th>Спецификаций</th><th>Активная спецификация</th>' +
      '</tr></thead><tbody id="bundle-spec-tbody"></tbody></table>';
    var tbody = document.getElementById('bundle-spec-tbody');
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var tr = document.createElement('tr');
      if (!item.matched) tr.classList.add('bundle-unmatched-row');

        '<td class="num">' + fmt(item.specCount || 0) + '</td>' +
        '<td>' + buildBundleSpecCellHtml(item) + '</td>';
      tbody.appendChild(tr);
    }

function collectBundlePayload() {
  var activeSpecs = {};
  var manualCosts = {};

  /* Read spec selections — from Tabulator or DOM */
  if (STATE.tables.bundleSpec) {
    var specData = STATE.tables.bundleSpec.getData();
    for (var s = 0; s < specData.length; s++) {
      if (specData[s].matched && specData[s].activeSpec) {
        activeSpecs[specData[s].bundle] = specData[s].activeSpec;
      }
    }
    /* Also check for user-changed selects rendered inside Tabulator cells */
    var specSelects = document.querySelectorAll('#bundle-spec-container select[data-bundle]');
    for (var i = 0; i < specSelects.length; i++) {
      activeSpecs[specSelects[i].getAttribute('data-bundle')] = specSelects[i].value;
    }
  } else {
    var specSelectsFb = document.querySelectorAll('#bundle-spec-container select[data-bundle], #bundle-spec-tbody select[data-bundle]');
    for (var k = 0; k < specSelectsFb.length; k++) {
      activeSpecs[specSelectsFb[k].getAttribute('data-bundle')] = specSelectsFb[k].value;
    }
  }

  /* Read manual costs — from Tabulator or DOM */
  if (STATE.tables.bundleManual) {
    var manualData = STATE.tables.bundleManual.getData();
    for (var m = 0; m < manualData.length; m++) {
      var raw = manualData[m].manualCost;
      manualCosts[manualData[m].component] = (raw === null || raw === undefined || raw === '') ? '' : parseFloat(raw);
    }
  } else {
    var manualInputs = document.querySelectorAll('#bundle-manual-container input[data-component], #bundle-manual-tbody input[data-component]');
    for (var j = 0; j < manualInputs.length; j++) {
      var rawVal = String(manualInputs[j].value || '').trim();
      manualCosts[manualInputs[j].getAttribute('data-component')] = rawVal === '' ? '' : parseFloat(rawVal);
    }
  }

  return {
    activeSpecs: activeSpecs,
    manualCosts: manualCosts
  };
}

function loadPlanImportSourceUI(silent) {
  if (!STATE.planImportCtx) openPlanImportModal();

    .withSuccessHandler(function(res) {
      hideLoading();

        setStatus('plan-cost-status', (res && res.message) || 'Не удалось загрузить источник плана.', 'error');
        return;
      }

      STATE.planImportCtx.spreadsheetUrl = url;
      STATE.planImportCtx.spreadsheetName = res.spreadsheetName || '';
      STATE.planImportCtx.sheets = res.sheets || [];
      if (!STATE.planImportCtx.sheetName && STATE.planImportCtx.sheets.length) {
        for (var si = 0; si < STATE.planImportCtx.sheets.length; si++) {
          if (STATE.planImportCtx.sheets[si].selectable !== false) {
            STATE.planImportCtx.sheetName = STATE.planImportCtx.sheets[si].name;
            break;
          }
        }
        if (!STATE.planImportCtx.sheetName) {
          STATE.planImportCtx.sheetName = STATE.planImportCtx.sheets[0].name;
        }
      }
      var hasCurrent = false;
      for (var i = 0; i < STATE.planImportCtx.sheets.length; i++) {
        if (STATE.planImportCtx.sheets[i].name === STATE.planImportCtx.sheetName) {
          hasCurrent = true;
          break;
        }
      }
      if (!hasCurrent && STATE.planImportCtx.sheets.length) {
        for (var sj = 0; sj < STATE.planImportCtx.sheets.length; sj++) {
          if (STATE.planImportCtx.sheets[sj].selectable !== false) {
            STATE.planImportCtx.sheetName = STATE.planImportCtx.sheets[sj].name;
            hasCurrent = true;
            break;
          }

        if (!hasCurrent) {
          STATE.planImportCtx.sheetName = STATE.planImportCtx.sheets[0].name;
        }

      renderPlanImportSheetOptions_();
      refreshPlanImportPreview();
      if (!silent) {

      hideLoading();
      setStatus('plan-cost-status', 'Ошибка загрузки источника плана: ' + err.message, 'error');
    })
    .getPlanImportSource(url);

function buildPlanImportMapping_() {
  var headers = STATE.planImportCtx.headers || [];
  var config = (STATE.planCost && STATE.planCost.importConfig) ? STATE.planCost.importConfig : null;
  var current = {};
  var fields = ['name', 'articleWb'];

  for (var i = 0; i < fields.length; i++) {
    var select = document.getElementById('plan-map-' + fields[i]);
    if (select) current[fields[i]] = parseInt(select.value, 10);
  }

  var mapping = {};
  for (i = 0; i < fields.length; i++) {
    var field = fields[i];
    var best = -1;
    var savedHeader = config && config.mapping
      ? String(field === 'name' ? (config.mapping.nameHeader || '') : (config.mapping.articleWbHeader || '')).trim()
      : '';
    if (typeof current[field] === 'number' && !isNaN(current[field]) && current[field] >= 0 && current[field] < headers.length) {
      best = current[field];
    } else if (STATE.planImportCtx.mapping && typeof STATE.planImportCtx.mapping[field] === 'number' && STATE.planImportCtx.mapping[field] >= 0 && STATE.planImportCtx.mapping[field] < headers.length) {
      best = STATE.planImportCtx.mapping[field];
    } else if (savedHeader) {
      for (var s = 0; s < headers.length; s++) {
        if (normalizeKeyV2(headers[s]) === normalizeKeyV2(savedHeader)) {
          best = s;
          break;
        }
      }
    } else if (config && config.mapping && typeof config.mapping[field] === 'number' && config.mapping[field] >= 0 && config.mapping[field] < headers.length) {
      best = config.mapping[field];
    } else {
      var hints = field === 'name'
        ? ['наименование', 'номенклатура', 'товар']
        : ['артикул вб', 'wb', 'wildberries'];
      for (var h = 0; h < hints.length; h++) {
        var hint = normalizeKeyV2(hints[h]);
        for (var j = 0; j < headers.length; j++) {
          if (normalizeKeyV2(headers[j]).indexOf(hint) >= 0) {
            best = j;
            break;
          }
        }
        if (best >= 0) break;
      }
    }
    mapping[field] = best;
  }

  return mapping;
}

function renderPlanPreviewTable_(previewRows) {
  var rows = previewRows || [];
  if (!rows.length && STATE.planImportCtx && STATE.planImportCtx.sheets) {
    for (var i = 0; i < STATE.planImportCtx.sheets.length; i++) {
      if (STATE.planImportCtx.sheets[i].name === STATE.planImportCtx.sheetName) {
        rows = STATE.planImportCtx.sheets[i].previewRows || [];
        break;
      }
    }
  }

  var headers = STATE.planImportCtx ? (STATE.planImportCtx.headers || []) : [];
  var coloredCols = {};
  if (STATE.planImportCtx && STATE.planImportCtx.mapping) {
    if (typeof STATE.planImportCtx.mapping.name === 'number' && STATE.planImportCtx.mapping.name >= 0) coloredCols[STATE.planImportCtx.mapping.name] = '#dce8ff';
    if (typeof STATE.planImportCtx.mapping.articleWb === 'number' && STATE.planImportCtx.mapping.articleWb >= 0) coloredCols[STATE.planImportCtx.mapping.articleWb] = '#dce8ff';
  }
  if (STATE.planImportCtx && STATE.planImportCtx.months) {
    for (i = 0; i < STATE.planImportCtx.months.length; i++) {
      if (typeof STATE.planImportCtx.months[i].column === 'number' && STATE.planImportCtx.months[i].column >= 0) {
        coloredCols[STATE.planImportCtx.months[i].column] = '#eefbf2';
      }
    }
  }

  var thead = document.getElementById('plan-preview-head');
  var tbody = document.getElementById('plan-preview-body');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  if (!headers.length) {
    var trNoHeaders = document.createElement('tr');
    var tdNoHeaders = document.createElement('td');
    tdNoHeaders.textContent = 'Загрузите источник и выберите строку заголовков.';
    trNoHeaders.appendChild(tdNoHeaders);
    tbody.appendChild(trNoHeaders);
    return;
  }

  var headRow = document.createElement('tr');
  for (var h = 0; h < headers.length; h++) {
    var th = document.createElement('th');
    th.textContent = colLabelV2(h) + ': ' + headers[h];
    if (coloredCols[h]) th.style.background = coloredCols[h];
    headRow.appendChild(th);
  }
  thead.appendChild(headRow);

  var startRow = STATE.planImportCtx ? STATE.planImportCtx.headerRow : 1;
  var dataRows = rows.slice(startRow);
  var previewCount = Math.min(dataRows.length, 20);
  if (!previewCount) {
    var trEmpty = document.createElement('tr');
    var tdEmpty = document.createElement('td');
    tdEmpty.colSpan = Math.max(headers.length, 1);
    tdEmpty.textContent = 'Нет строк данных для предпросмотра.';
    trEmpty.appendChild(tdEmpty);
    tbody.appendChild(trEmpty);
    return;
  }

  for (var r = 0; r < previewCount; r++) {
    var tr = document.createElement('tr');
    var row = dataRows[r] || [];
    for (var c = 0; c < headers.length; c++) {
      var td = document.createElement('td');
      td.textContent = row[c] === null || row[c] === undefined ? '' : String(row[c]);
      if (coloredCols[c]) td.style.background = coloredCols[c] === '#eefbf2' ? '#f4fff7' : '#f5f9ff';
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

      return {
        key: month.key,
        label: String(labelInput ? labelInput.value : month.label).trim(),
        column: col,
        header: (typeof col === 'number' && !isNaN(col) && col >= 0 && col < headers.length) ? headers[col] : ''
      };
    })
  };
}

function confirmPlanImport() {
  if (!STATE.planImportCtx || !STATE.planImportCtx.sheets || !STATE.planImportCtx.sheets.length) {
    showAlert('Внимание', 'Сначала загрузите источник плана.');
    return;
  }

  var selectedSheet = null;
  for (var si = 0; si < STATE.planImportCtx.sheets.length; si++) {
    if (STATE.planImportCtx.sheets[si].name === STATE.planImportCtx.sheetName) {
      selectedSheet = STATE.planImportCtx.sheets[si];
      break;
    }
  }
  if (selectedSheet && selectedSheet.selectable === false) {
    showAlert('Внимание', selectedSheet.previewError || 'Выбранный лист не поддерживается для импорта плана.');
    return;
  }

  var payload = buildPlanImportPayload_();
  if (payload.mapping.name < 0 && payload.mapping.articleWb < 0) {
    showAlert('Внимание', 'Укажите хотя бы одну колонку сопоставления: Наименование или Артикул ВБ.');
    return;
  }
  var activeMonths = 0;
  for (var i = 0; i < payload.months.length; i++) {
    var hasLabel = !!String(payload.months[i].label || '').trim();
    var hasColumn = payload.months[i].column >= 0;
    if (!hasLabel && !hasColumn) continue;
    if (!hasLabel || !hasColumn) {
      showAlert('Внимание', 'У каждого заполненного месяца должны быть указаны и название, и колонка количества.');
      return;
    }
    activeMonths++;
  }
  if (!activeMonths) {
    showAlert('Внимание', 'Укажите хотя бы один месяц плана.');
    return;
  }

  closePlanImportModal();
  showLoading();
  setStatus('plan-cost-status', 'Импортирую план продаж...', 'info');
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoading();
      if (!res || !res.success) {
        setStatus('plan-cost-status', (res && res.message) || 'Импорт плана завершился с ошибкой.', 'error');
        return;
      }

      var summary = res.importSummary || {};
      var message = 'План импортирован: ' + (summary.matchedItems || 0) + ' сопоставлено, ' + (summary.unmatchedItems || 0) + ' не сопоставлено, дублей объединено: ' + Math.max((summary.processedRows || 0) - (summary.dedupedRows || 0), 0) + '.';
      setStatus('plan-cost-status', message, 'success');
      if (res.stateLoadError) {
        showToast('План импортирован. Состояние вкладки обновляю отдельно: ' + res.stateLoadError, 'warning');
      }
      loadPlanCostStateUI(true);
    })
    .withFailureHandler(function(err) {
      hideLoading();
      setStatus('plan-cost-status', 'Ошибка импорта плана: ' + err.message, 'error');
    })
    .importPlanCosts(payload);
}

function loadPlanCostStateUI(shouldCalculate) {
  showLoading();
  google.script.run
    .withSuccessHandler(function(state) {
      hideLoading();
      applyPlanCostState_(state || {});

      if (!STATE.planCost.items || !STATE.planCost.items.length) {
        setStatus('plan-cost-status', 'План ещё не импортирован.', 'info');
        renderPlanCostStats(null);
        renderPlanCostTable([]);
        return;
      }

      var summary = STATE.planCost.importSummary || {};
      setStatus(
        'plan-cost-status',
        'Загружено строк плана: ' + (STATE.planCost.items.length || 0) +
          ', сопоставлено: ' + (summary.matchedItems || 0) +
          ', не сопоставлено: ' + (summary.unmatchedItems || 0),
        'success'
      );

      if (shouldCalculate) runPlanCalculation();
    })
    .withFailureHandler(function(err) {
      hideLoading();
      setStatus('plan-cost-status', 'Ошибка загрузки плана: ' + err.message, 'error');
    })
    .getPlanCostState();
}

function applyPlanCostState_(state) {
  STATE.planCost.loaded = true;
  STATE.planCost.months = state.months || [];
  STATE.planCost.items = state.items || [];
  STATE.planCost.stats = state.stats || null;
  STATE.planCost.importSummary = state.importSummary || null;
  STATE.planCost.importConfig = state.importConfig || null;
  renderPlanMonthSelect_();
  renderPlanCostStats(null);
}

function renderPlanMonthSelect_() {
  var select = document.getElementById('plan-month-select');
  if (!select) return;

  var current = STATE.planCost.activeMonthKey || select.value;
  select.innerHTML = '<option value="">— Выберите месяц —</option>';

  var months = STATE.planCost.months || [];
  for (var i = 0; i < months.length; i++) {
    var opt = document.createElement('option');
    opt.value = months[i].key;
    opt.textContent = months[i].label;
    select.appendChild(opt);
  }

  if (current) {
    for (i = 0; i < months.length; i++) {
      if (months[i].key === current) {
        select.value = current;
        STATE.planCost.activeMonthKey = current;
        return;
      }
    }
  }

  if (months.length) {
    select.value = months[0].key;
    STATE.planCost.activeMonthKey = months[0].key;
  }
}

function runPlanCalculation() {
  if (!STATE.planCost || !STATE.planCost.loaded || !STATE.planCost.items || !STATE.planCost.items.length) {
    loadPlanCostStateUI(true);
    return;
  }

  var monthSelect = document.getElementById('plan-month-select');
  var monthKey = monthSelect ? monthSelect.value : '';
  if (!monthKey) {
    if (STATE.planCost.months && STATE.planCost.months.length) {
      renderPlanMonthSelect_();
      monthKey = monthSelect ? monthSelect.value : '';
    }
  }
  if (!monthKey) {
    setStatus('plan-cost-status', 'Выберите месяц для расчёта.', 'info');
    return;
  }

  STATE.planCost.activeMonthKey = monthKey;
  showLoading();
  setStatus('plan-cost-status', 'Рассчитываю затраты по плану...', 'info');
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoading();
      if (!res || !res.success) {
        setStatus('plan-cost-status', (res && res.message) || 'Не удалось рассчитать план.', 'error');
        return;
      }

      STATE.planCost.results = res.results || [];
      renderPlanCostTable(STATE.planCost.results);
      renderPlanCostStats(res);
      setStatus(
        'plan-cost-status',
        'Рассчитано позиций для месяца "' + (res.monthLabel || monthKey) + '": ' + (STATE.planCost.results.length || 0) + ', unmatched: ' + ((res.stats && res.stats.unmatchedItems) || 0),
        'success'
      );
    })
    .withFailureHandler(function(err) {
      hideLoading();
      setStatus('plan-cost-status', 'Ошибка расчёта плана: ' + err.message, 'error');
    })
    .calculatePlanCosts(monthKey);
}

function renderPlanCostStats(calcResponse) {
  var host = document.getElementById('plan-cost-stats');
  if (!host) return;

  if (!calcResponse || !calcResponse.stats) {
    var base = STATE.planCost.stats || { totalItems: 0, matchedItems: 0, unmatchedItems: 0 };
    host.innerHTML =
      '<span class="stat-item"><span class="stat-dot" style="background:#64748b"></span>Импортировано: ' + (base.totalItems || 0) + '</span>' +
      '<span class="stat-item"><span class="stat-dot" style="background:#22c55e"></span>Сопоставлено: ' + (base.matchedItems || 0) + '</span>' +
      '<span class="stat-item"><span class="stat-dot" style="background:#f59e0b"></span>Не сопоставлено: ' + (base.unmatchedItems || 0) + '</span>';
    return;
  }

  var stats = calcResponse.stats || {};
  host.innerHTML =
    '<span class="stat-item"><span class="stat-dot" style="background:#0f766e"></span>Месяц: ' + esc(calcResponse.monthLabel || '') + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#1d4ed8"></span>Бюджет: <b>' + fmt(stats.totalBudget) + '</b></span>' +
    '<span class="stat-item">План, шт: <b>' + fmt(stats.totalPlanQty) + '</b></span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#c5221f"></span>Сырьё: ' + ((stats.types && stats.types.raw) || 0) + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#137333"></span>Гот.товар: ' + ((stats.types && stats.types.finished) || 0) + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#0b57d0"></span>Флаконы: ' + ((stats.types && stats.types.flakons) || 0) + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#9e9e9e"></span>Наборы: ' + ((stats.types && stats.types.sets) || 0) + '</span>' +
    '<span class="stat-item">|</span>' +
    '<span class="stat-item">Сырьё: <b>' + fmt(stats.rawPlan) + '</b></span>' +
    '<span class="stat-item">Доставка: <b>' + fmt(stats.deliveryPlan) + '</b></span>' +
    '<span class="stat-item">Себес. фл.: <b>' + fmt(stats.totalFlPlan) + '</b></span>' +
    '<span class="stat-item">Unmatched: <b>' + (stats.unmatchedItems || 0) + '</b></span>';
}

function buildPlanTabulatorColumns_() {
  var columns = [];
  for (var i = 0; i < PLAN_COST_COLUMNS.length; i++) {
    var col = PLAN_COST_COLUMNS[i];
    var def = {
      title: col.label,
      field: col.key,
      headerSort: true,
      resizable: true,
      minWidth: col.width || 100
    };

    if (col.key === 'name') {
      def.frozen = true;
      def.headerFilter = 'input';
      def.headerFilterPlaceholder = 'Поиск...';
      def.bottomCalc = function() { return 'Итого'; };
    } else if (col.key === 'type') {
      def.formatter = fmtTypeBadge;
      def.headerFilter = 'list';
      def.headerFilterParams = { values: { '': 'Все', 'Сырьё': 'Сырьё', 'Готовый товар': 'Готовый товар', 'Флакон': 'Флакон', 'Наборы': 'Наборы' } };
    } else if (col.filter === 'input') {
      def.headerFilter = 'input';
      def.headerFilterPlaceholder = 'Поиск...';
    } else if (col.filter === 'list') {
      def.headerFilter = 'list';
      def.headerFilterFunc = '=';
      def.headerFilterParams = { valuesLookup: true, sortValuesList: 'asc' };
    } else if (col.numeric) {
      def.headerFilter = false;
    }

    if (col.numeric) {
      def.hozAlign = 'right';
      def.formatter = fmtNumber;
      def.formatterParams = { decimals: 2 };
      def.bottomCalc = 'sum';
      def.bottomCalcFormatter = fmtNumber;
      def.bottomCalcFormatterParams = { decimals: 2 };
    }

    if (col.total) {
      def.cssClass = 'col-total';
    }

    columns.push(def);
  }
  return columns;
}

function renderPlanCostTable(results) {
  var data = results || [];
  var container = document.getElementById('plan-cost-table-container');
  if (!container) return;

  if (!data.length) {
    if (STATE.tables.planCost) {
      STATE.tables.planCost.destroy();
      STATE.tables.planCost = null;
    }
    container.innerHTML = '<div class="tabulator"><div class="tabulator-placeholder">Импортируйте план и выберите месяц для расчёта.</div></div>';
    return;
  }

  var columns = buildPlanTabulatorColumns_();
  if (STATE.tables.planCost) {
    STATE.tables.planCost.replaceData(data);
    return;
  }

  STATE.tables.planCost = createTable('plan-cost-table-container', columns, data, {
    height: '72vh',
    layout: 'fitDataFill',
    placeholder: 'Импортируйте план и выберите месяц для расчёта',
    dataTree: true,
    columnCalcs: 'table',
    dataTreeChildColumnCalcs: false,
    dataTreeStartExpanded: false,
    dataTreeChildField: '_children',
    dataTreeChildIndent: 18,
    rowFormatter: function(row) {
      var d = row.getData();
      if (d && d.isComponent) row.getElement().classList.add('plan-component-row');
    }
  });
}
</script>
