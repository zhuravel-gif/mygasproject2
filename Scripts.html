<script>
// ============================================================
// ГЛОБАЛЬНОЕ СОСТОЯНИЕ
// ============================================================
var STATE = {
  exportData: null,    // { headers, rows }
  calcResults: null,   // массив результатов
  flakons: [],         // массив флаконов
  params: null,        // текущие параметры
  xlsxReady: false,    // SheetJS загружен
  importType: null,    // 'nomenclature' | 'cost' | 'price'
  importFileData: null, // { headers, rows } из файла
  tables: {}           // Tabulator instances
};

// НДС/Пошлина: очередь изменений для batch-сохранения
var NDS_TAX_PENDING = {};
var NDS_TAX_TIMER = null;

// ============================================================
// НАВИГАЦИЯ
// ============================================================
function showTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('tab-' + tabId).classList.add('active');
  var tabs = document.querySelectorAll('.nav-tab');
  var names = ['params','export','flakons','cost','calc','verify'];
  for (var i = 0; i < names.length; i++) {
    if (names[i] === tabId) tabs[i].classList.add('active');
  }
  if (tabId === 'params' && !STATE.params) loadParamsUI();
  if (tabId === 'flakons' && STATE.flakons.length === 0) loadFlakonsUI();
  if (tabId === 'calc') ensureFlakonsState(function() {
    populateCalcSelects();
    syncCalcParamsFromParams(STATE.params || getParamsFromUI());
  });
  if (tabId === 'verify') populateVerifySelect();
}

// ============================================================
// LOADING / STATUS
// ============================================================
function showLoading() { document.getElementById('loading').classList.add('active'); }
function hideLoading() { document.getElementById('loading').classList.remove('active'); }

function setStatus(id, msg, type) {
  var el = document.getElementById(id);
  if (el) { el.textContent = msg; el.className = 'status ' + (type || ''); }
  if (typeof showToast === 'function' && (type === 'success' || type === 'error')) {
    showToast(msg, type);
  }
}

function toggleImportGuide() {
  var guide = document.getElementById('import-guide');
  if (!guide) return;
  guide.classList.toggle('hidden');
}

function toggleFlakonGuide() {
  var guide = document.getElementById('flakon-guide');
  if (!guide) return;
  guide.classList.toggle('hidden');
}

function ensureFlakonsState(callback) {
  if (STATE.flakons && STATE.flakons.length) {
    if (callback) callback();
    return;
  }

  google.script.run
    .withSuccessHandler(function(flakons) {
      STATE.flakons = flakons || [];
      if (callback) callback();
    })
    .withFailureHandler(function() {
      if (callback) callback();
    })
    .getFlakonList();
}

function isKnownFlakonName(name) {
  var target = String(name || '').trim();
  if (!target || !STATE.flakons || !STATE.flakons.length) return false;
  for (var i = 0; i < STATE.flakons.length; i++) {
    if (String(STATE.flakons[i].name || '').trim() === target) return true;
  }
  return false;
}

function detectItemTypeForUI(row) {
  var name = String(row && row[0] || '').trim();
  var isSet = String(row && row[11] || '').trim();
  var hasRaw = row && row[7] && String(row[7]).trim() !== '';

  if (isKnownFlakonName(name)) return 'Флакон';
  if (isSet === 'Да') return 'Наборы';
  if (!hasRaw) return 'Готовый товар';
  return 'Сырьё';
}

function getTypeBadgeClass(type) {
  if (type === 'Сырьё') return 'badge-raw';
  if (type === 'Готовый товар') return 'badge-finished';
  if (type === 'Флакон') return 'badge-flakon';
  return 'badge-set';
}

// ============================================================
// XLSX LAZY LOAD
// ============================================================
function loadXLSX(callback) {
  if (typeof XLSX !== 'undefined') { STATE.xlsxReady = true; callback(); return; }
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = function() { STATE.xlsxReady = true; callback(); };
  s.onerror = function() { setStatus('export-status', 'Ошибка загрузки XLSX библиотеки. Проверьте интернет.', 'error'); };
  document.head.appendChild(s);
}

// ============================================================
// TAB 1 — IMPORT BUTTONS
// ============================================================
function startImport(type) {
  STATE.importType = type;
  loadXLSX(function() {
    var fi = document.getElementById('import-file-input');
    fi.value = '';
    fi.click();
  });
}

function handleImportFileSelected(event) {
  var input = event.target;
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  showLoading();
  setStatus('export-status', 'Читаю файл ' + file.name + '...', 'info');

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, { type: 'array', cellText: true, cellDates: false });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
      hideLoading();

      if (!rows || rows.length < 2) {
        setStatus('export-status', 'Файл пустой или содержит менее 2 строк', 'error');
        return;
      }

      // Нормализовать заголовки
      var headers = rows[0].map(function(h) { return String(h || '').trim(); });
      var dataRows = rows.slice(1).filter(function(r) {
        return r.some(function(c) { return String(c || '').trim() !== ''; });
      });

      STATE.importFileData = { headers: headers, rows: dataRows, fileName: file.name };
      showMappingModal(file.name, headers, dataRows.length);
    } catch(err) {
      hideLoading();
      setStatus('export-status', 'Ошибка чтения файла: ' + err.message, 'error');
    }
  };
  reader.onerror = function() {
    hideLoading();
    setStatus('export-status', 'Ошибка чтения файла', 'error');
  };
  reader.readAsArrayBuffer(file);
}

// ============================================================
// MAPPING MODAL
// ============================================================

// Поля для импорта номенклатуры (14 базовых колонок)
var NOMENCLATURE_FIELDS = [
  { key: 'NAME',    label: 'Номенклатура (наименование)', required: true,  hints: ['номенклатура', 'наименован', 'имя товара'] },
  { key: 'ART',     label: 'Артикул',                     required: false, hints: ['артикул'] },
  { key: 'ART_WB',  label: 'Артикул ВБ',                  required: false, hints: ['вб', 'wildberries', 'артикул вб'] },
  { key: 'CAT',     label: 'Категория товаров',            required: false, hints: ['категор'] },
  { key: 'VOL',     label: 'Объём тары',                   required: false, hints: ['объем', 'объём', 'тар', 'объ'] },
  { key: 'GRP2',    label: 'Товарная группа 2',            required: false, hints: ['группа 2', 'группа2', 'группа.2'] },
  { key: 'GRP3',    label: 'Товарная группа 3',            required: false, hints: ['группа 3', 'группа3', 'группа.3'] },
  { key: 'RAW',     label: 'Основное сырьё',               required: false, hints: ['сырье', 'сырьё', 'основное сырье', 'основн'] },
  { key: 'FLAKON',  label: 'Тара (флакон)',                required: false, hints: ['тара', 'флакон'] },
  { key: 'SET_QTY', label: 'Кол-во в наборе',              required: false, hints: ['кол-во', 'количество', 'набор', 'лаков'] },
  { key: 'ART_MP',  label: 'Артикул МП',                   required: false, hints: ['артикул мп', 'мп'] },
  { key: 'IS_SET',  label: 'Это набор',                    required: false, hints: ['это набор', 'is_set', 'набор'] },
  { key: 'WEIGHT',  label: 'Вес (кг)',                     required: false, hints: ['вес', 'масса', 'исполн'] },
  { key: 'GRP1',    label: 'Товарная группа 1',            required: false, hints: ['группа 1', 'группа1', 'группа.1'] }
];

// Порядок полей при записи в 1cData
var FIELD_ORDER = ['NAME','ART','ART_WB','CAT','VOL','GRP2','GRP3','RAW','FLAKON','SET_QTY','ART_MP','IS_SET','WEIGHT','GRP1'];

function findBestMatch(hints, headers) {
  for (var h = 0; h < hints.length; h++) {
    var hint = hints[h].toLowerCase();
    for (var i = 0; i < headers.length; i++) {
      if (String(headers[i]).toLowerCase().indexOf(hint) >= 0) return i;
    }
  }
  return -1;
}

function colLabel(idx) {
  if (idx < 26) return String.fromCharCode(65 + idx);
  return String.fromCharCode(64 + Math.floor(idx / 26)) + String.fromCharCode(65 + (idx % 26));
}

function makeColOptions(headers, selected) {
  var opts = '<option value="-1">— Не импортировать —</option>';
  for (var i = 0; i < headers.length; i++) {
    var label = colLabel(i) + ': ' + esc(String(headers[i]).substring(0, 45));
    opts += '<option value="' + i + '"' + (i === selected ? ' selected' : '') + '>' + label + '</option>';
  }
  return opts;
}

function showMappingModal(fileName, headers, rowCount) {
  var type = STATE.importType;
  var titleMap = {
    nomenclature: 'Импорт из 1С номенклатуры',
    cost:         'Импорт себестоимости 1С',
    supplier:     'Импорт цены поставщика'
  };
  document.getElementById('import-modal-title').textContent = titleMap[type] || 'Маппинг столбцов';
  document.getElementById('import-modal-subtitle').textContent =
    fileName + ' · ' + rowCount + ' строк данных';

  var rateDefaults = (STATE.importSettings && STATE.importSettings.rateDefaults) || { nds: 0.22, tax: 0.065 };
  var ndsDefault = rateDefaults.nds;
  var taxDefault = rateDefaults.tax;

  var html = '';

  if (type === 'nomenclature') {
    html += '<p class="mapping-hint" style="margin-bottom:12px">Сопоставьте столбцы файла с полями таблицы. Поля со * обязательны.</p>';
    html += '<div class="mapping-scroll"><table class="mapping-table"><thead><tr><th>Поле таблицы</th><th>Столбец файла</th></tr></thead><tbody>';

    for (var f = 0; f < NOMENCLATURE_FIELDS.length; f++) {
      var field = NOMENCLATURE_FIELDS[f];
      var best = findBestMatch(field.hints, headers);
      if (best < 0 && field.key === 'NAME') best = 0;

      html += '<tr>' +
        '<td class="map-field-name">' + esc(field.label) + (field.required ? ' <span class="required">*</span>' : '') + '</td>' +
        '<td><select id="map-' + field.key + '" class="mapping-select">' + makeColOptions(headers, best) + '</select></td>' +
        '</tr>';
    }

    html += '</tbody></table></div>';

    // НДС/Пошлина defaults
    html += '<div class="mapping-defaults" style="margin-top:12px">' +
      '<div class="param-group"><label>НДС по умолчанию</label>' +
      '<input type="number" id="modal-nds" step="0.001" value="' + ndsDefault + '" style="width:100px"></div>' +
      '<div class="param-group"><label>Пошлина по умолчанию</label>' +
      '<input type="number" id="modal-tax" step="0.001" value="' + taxDefault + '" style="width:100px"></div>' +
      '</div>';

  } else {
    // Cost or Supplier: выбрать 2 столбца
    var nameHints = ['номенклатур', 'наименован', 'имя'];
    var valueHints = type === 'cost'
      ? ['себестоимость', 'стоимость', 'cost', 'цена']
      : ['цена поставщика', 'цена', 'price', 'стоимость'];

    var nameIdx  = findBestMatch(nameHints, headers);
    var valueIdx = findBestMatch(valueHints, headers);
    if (nameIdx < 0) nameIdx = 0;
    if (valueIdx < 0) valueIdx = Math.min(1, headers.length - 1);
    if (valueIdx === nameIdx && headers.length > 1) valueIdx = nameIdx === 0 ? 1 : 0;

    var valueLabel = type === 'cost' ? 'Себестоимость 1С' : 'Цена поставщика';

    html += '<p class="mapping-hint" style="margin-bottom:12px">Укажите, в каких столбцах находятся наименование и значение.</p>';
    html += '<table class="mapping-table"><thead><tr><th>Поле</th><th>Столбец файла</th></tr></thead><tbody>';
    html += '<tr><td class="map-field-name">Наименование номенклатуры <span class="required">*</span></td>' +
            '<td><select id="map-NAME" class="mapping-select">' + makeColOptions(headers, nameIdx) + '</select></td></tr>';
    html += '<tr><td class="map-field-name">' + esc(valueLabel) + ' <span class="required">*</span></td>' +
            '<td><select id="map-VALUE" class="mapping-select">' + makeColOptions(headers, valueIdx) + '</select></td></tr>';
    html += '</tbody></table>';
  }

  document.getElementById('import-mapping-grid').innerHTML = html;
  document.getElementById('import-modal').classList.add('active');
  document.body.classList.add('modal-open');
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('active');
  document.body.classList.remove('modal-open');
}

function confirmImport() {
  var type = STATE.importType;
  var fd   = STATE.importFileData;
  if (!fd) return;

  if (type === 'nomenclature') {
    // Собрать маппинг
    var mapping = {};
    for (var f = 0; f < NOMENCLATURE_FIELDS.length; f++) {
      var key = NOMENCLATURE_FIELDS[f].key;
      var sel = document.getElementById('map-' + key);
      mapping[key] = sel ? parseInt(sel.value) : -1;
    }
    if (mapping.NAME < 0) {
      showAlert('Внимание', 'Необходимо выбрать столбец с наименованием номенклатуры.');
      return;
    }

    var nds = parseFloat(document.getElementById('modal-nds').value) || 0.22;
    var tax = parseFloat(document.getElementById('modal-tax').value) || 0.065;

    // Построить массив данных в порядке FIELD_ORDER
    var fieldLabels = FIELD_ORDER.map(function(k) {
      var fi = NOMENCLATURE_FIELDS.filter(function(x){ return x.key === k; })[0];
      return fi ? fi.label : k;
    });
    var exportRows = [fieldLabels];

    for (var i = 0; i < fd.rows.length; i++) {
      var srcRow = fd.rows[i];
      var nameVal = String(srcRow[mapping.NAME] || '').trim();
      if (!nameVal) continue; // пропустить пустые строки
      var dstRow = FIELD_ORDER.map(function(k) {
        var idx = mapping[k];
        return (idx >= 0 && idx < srcRow.length) ? (srcRow[idx] || '') : '';
      });
      exportRows.push(dstRow);
    }

    if (exportRows.length < 2) {
      showAlert('Внимание', 'После фильтрации не осталось данных для импорта.');
      return;
    }

    closeImportModal();
    showLoading();
    setStatus('export-status', 'Импортирую номенклатуру (' + (exportRows.length - 1) + ' позиций)...', 'info');

    google.script.run
      .withSuccessHandler(function(res) {
        hideLoading();
        setStatus('export-status', res.success ? ('✓ ' + res.message) : ('✗ ' + res.message),
                  res.success ? 'success' : 'error');
        if (res.success) loadExportData();
      })
      .withFailureHandler(function(err) {
        hideLoading();
        setStatus('export-status', 'Ошибка: ' + err.message, 'error');
      })
      .importNomenclature(exportRows, nds, tax);

  } else {
    // cost или supplier
    var nameSel  = document.getElementById('map-NAME');
    var valueSel = document.getElementById('map-VALUE');
    if (!nameSel || !valueSel) return;

    var nameIdx  = parseInt(nameSel.value);
    var valueIdx = parseInt(valueSel.value);

    if (nameIdx < 0) { showAlert('Ошибка', 'Укажите столбец с наименованием.'); return; }
    if (valueIdx < 0) { showAlert('Ошибка', 'Укажите столбец со значением.'); return; }

    var mappedData = [];
    for (var i = 0; i < fd.rows.length; i++) {
      var r = fd.rows[i];
      var name = String(r[nameIdx] || '').trim();
      var rawVal = String(r[valueIdx] || '').replace(/\s/g,'').replace(',', '.');
      var val  = parseFloat(rawVal) || 0;
      if (name && val > 0) mappedData.push({ name: name, value: val });
    }

    if (mappedData.length === 0) {
      showAlert('Внимание', 'Не найдено строк с данными (наименование + числовое значение > 0).');
      return;
    }

    closeImportModal();
    showLoading();
    var label = type === 'cost' ? 'себестоимости' : 'цены поставщика';
    setStatus('export-status', 'Импортирую ' + label + ' (' + mappedData.length + ' строк)...', 'info');

    if (type === 'cost') {
      google.script.run
        .withSuccessHandler(function(res) {
          hideLoading();
          setStatus('export-status', res.success ? ('✓ ' + res.message) : ('✗ ' + res.message),
                    res.success ? 'success' : 'error');
          if (res.success) loadExportData();
        })
        .withFailureHandler(function(err) {
          hideLoading();
          setStatus('export-status', 'Ошибка: ' + err.message, 'error');
        })
        .importCost1C(mappedData);
    } else {
      google.script.run
        .withSuccessHandler(function(res) {
          hideLoading();
          setStatus('export-status', res.success ? ('✓ ' + res.message) : ('✗ ' + res.message),
                    res.success ? 'success' : 'error');
          if (res.success) loadExportData();
        })
        .withFailureHandler(function(err) {
          hideLoading();
          setStatus('export-status', 'Ошибка: ' + err.message, 'error');
        })
        .importSupplierPrice(mappedData);
    }
  }
}

// ============================================================
// НДС / ПОШЛИНА — BATCH SAVE
// ============================================================
function onNdsTaxChange(rowIdx, field, value) {
  if (!NDS_TAX_PENDING[rowIdx]) NDS_TAX_PENDING[rowIdx] = {};
  NDS_TAX_PENDING[rowIdx][field] = parseFloat(value) || 0;
  clearTimeout(NDS_TAX_TIMER);
  NDS_TAX_TIMER = setTimeout(flushNdsTaxUpdates, 1500);
}

function flushNdsTaxUpdates() {
  var updates = [];
  for (var rowIdx in NDS_TAX_PENDING) {
    var u = NDS_TAX_PENDING[rowIdx];
    updates.push({ row: parseInt(rowIdx), nds: u.nds, tax: u.tax });
  }
  NDS_TAX_PENDING = {};
  if (!updates.length) return;

  google.script.run
    .withSuccessHandler(function() {
      setStatus('export-status', '✓ НДС/Пошлина сохранены (' + updates.length + ' строк)', 'success');
    })
    .withFailureHandler(function(err) {
      setStatus('export-status', 'Ошибка сохранения НДС/Пошлины: ' + err.message, 'error');
    })
    .updateNdsTax(updates);
}

function applyRatesToAllUI() {
  var ndsInput = document.getElementById('bulk-nds');
  var taxInput = document.getElementById('bulk-tax');
  if (!ndsInput || !taxInput) {
    setStatus('export-status', 'Массовое применение НДС и Пошлины отключено в текущем интерфейсе.', 'info');
    return;
  }

  var nds = parseFloat(ndsInput.value);
  var tax = parseFloat(taxInput.value);
  if (isNaN(nds) || isNaN(tax)) { showAlert('Ошибка', 'Введите корректные значения НДС и Пошлины.'); return; }

  showConfirm('Подтверждение',
    'Применить НДС=' + (nds * 100).toFixed(1) + '% и Пошлину=' + (tax * 100).toFixed(1) + '% ко ВСЕМ строкам таблицы?'
  ).then(function(result) {
    if (!result.isConfirmed) return;
    showLoading();
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoading();
        if (res && res.success) {
          setStatus('export-status', '✓ НДС/Пошлина применены к ' + res.count + ' строкам', 'success');
          loadExportData();
        }
      })
      .withFailureHandler(function(err) {
        hideLoading();
        setStatus('export-status', 'Ошибка: ' + err.message, 'error');
      })
      .updateAllNdsTax(nds, tax);
  });
}

function saveRateEditsUI() {
  flushNdsTaxUpdates();
}

// ============================================================
// TAB 1 — RENDER EXPORT TABLE
// ============================================================
function loadExportData() {
  showLoading();
  google.script.run
    .withSuccessHandler(function(data) {
      hideLoading();
      STATE.exportData = data;
      renderExportTable(data);
      renderExportStats(data);
    })
    .withFailureHandler(function(err) {
      hideLoading();
      setStatus('export-status', 'Ошибка загрузки: ' + err.message, 'error');
    })
    .getData();
}

// Индексы в строке данных (соответствуют CFG в DataService.js)
var EXPORT_PRICE_COL = 15;
var EXPORT_NDS_COL = 16;
var EXPORT_TAX_COL = 17;

function renderExportTable(data) {
  if (!data || !data.headers) return;

  STATE.exportData = data;

  if (typeof Tabulator === 'undefined') {
    // Vanilla fallback — render simple table
    var container = document.getElementById('export-table-container');
    container.innerHTML = '<div class="table-wrap"><table class="data-table"><thead><tr id="export-thead"></tr></thead><tbody id="export-tbody"></tbody></table></div>';
    var thead = document.getElementById('export-thead');
    for (var h = 0; h < data.headers.length; h++) {
      var th = document.createElement('th');
      var full = String(data.headers[h] || '');
      th.textContent = full.length > 22 ? full.substring(0, 20) + '…' : full;
      th.title = full;
      thead.appendChild(th);
    }
    renderExportRowsVanilla(data.rows);
    return;
  }

  // Convert array-of-arrays to array-of-objects for Tabulator
  var rows = data.rows || [];
  var headers = data.headers || [];
  var tableData = [];
  for (var i = 0; i < rows.length; i++) {
    var obj = { _rowIndex: i };
    for (var j = 0; j < headers.length; j++) {
      obj['col' + j] = rows[i][j];
    }
    tableData.push(obj);
  }

  // Priority column order: Наименование, Артикул, Артикул ВБ, Категория,
  // Объём тары, Товарная группа 1, Цена поставщика, НДС, Пошлина, затем остальные
  var EXPORT_COL_ORDER = [0, 1, 2, 3, 4, 5, EXPORT_PRICE_COL, EXPORT_NDS_COL, EXPORT_TAX_COL];
  var orderedIndices = [];
  var seen = {};
  for (var p = 0; p < EXPORT_COL_ORDER.length; p++) {
    if (EXPORT_COL_ORDER[p] < headers.length) {
      orderedIndices.push(EXPORT_COL_ORDER[p]);
      seen[EXPORT_COL_ORDER[p]] = true;
    }
  }
  for (var r = 0; r < headers.length; r++) {
    if (!seen[r]) orderedIndices.push(r);
  }

  // Build columns in the specified order
  var columns = [];
  for (var idx = 0; idx < orderedIndices.length; idx++) {
    var c = orderedIndices[idx];
    var colDef = {
      title: String(headers[c] || ''),
      field: 'col' + c,
      headerSort: true,
      resizable: true,
      headerTooltip: true
    };

    if (c === 0) {
      // Name column — frozen, with search filter
      colDef.frozen = true;
      colDef.minWidth = 200;
      colDef.headerFilter = 'input';
      colDef.headerFilterPlaceholder = 'Поиск...';
    } else if (c === EXPORT_PRICE_COL) {
      // Editable supplier price column
      colDef.editor = 'number';
      colDef.editorParams = { step: 0.01, min: 0 };
      colDef.hozAlign = 'right';
      colDef.minWidth = 100;
      colDef.cssClass = 'calc-col';
      colDef.formatter = function(cell) {
        var val = cell.getValue();
        if (val === null || val === undefined || val === '') return '0';
        return parseFloat(val).toFixed(2);
      };
    } else if (c === EXPORT_NDS_COL || c === EXPORT_TAX_COL) {
      // Editable NDS/Tax columns
      colDef.editor = 'number';
      colDef.editorParams = { step: 0.001, min: 0, max: 1 };
      colDef.hozAlign = 'right';
      colDef.minWidth = 90;
      colDef.cssClass = 'calc-col';
      colDef.formatter = function(cell) {
        var val = cell.getValue();
        if (val === null || val === undefined || val === '') return '';
        return parseFloat(val).toFixed(3);
      };
    } else {
      // Auto-detect numeric columns
      colDef.minWidth = 80;
      colDef.formatter = function(cell) {
        var val = cell.getValue();
        if (val === null || val === undefined || val === '') return '';
        var num = parseFloat(val);
        if (isNaN(num)) return String(val);
        return num % 1 === 0 ? String(num) : num.toFixed(2);
      };
      colDef.hozAlign = 'right';
    }

    columns.push(colDef);
  }

  if (STATE.tables.export) {
    STATE.tables.export.destroy();
    STATE.tables.export = null;
  }

  STATE.tables.export = createTable('export-table-container', columns, tableData, {
    height: '68vh',
    layout: 'fitDataFill',
    placeholder: 'Загрузите данные для отображения',
    cellEdited: function(cell) {
      var field = cell.getColumn().getField();
      var rowData = cell.getRow().getData();
      var rowIndex = rowData._rowIndex;
      var colIndex = parseInt(field.replace('col', ''), 10);
      var fieldName = colIndex === EXPORT_PRICE_COL ? 'supplierPrice' : (colIndex === EXPORT_NDS_COL ? 'nds' : 'tax');
      // Sync change back to STATE.exportData
      if (STATE.exportData && STATE.exportData.rows && STATE.exportData.rows[rowIndex]) {
        STATE.exportData.rows[rowIndex][colIndex] = cell.getValue();
      }
      onNdsTaxChange(rowIndex, fieldName, cell.getValue());
    }
  });
}

function renderExportRowsVanilla(rows) {
  var tbody = document.getElementById('export-tbody');

  tbody.innerHTML = '';
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var tr = document.createElement('tr');
    tr.setAttribute('data-name', (String(row[0] || '') + ' ' + String(row[1] || '')).toLowerCase());
    for (var j = 0; j < row.length; j++) {
      var td = document.createElement('td');
      var val = row[j];
      if (val !== null && val !== undefined && val !== '' && !isNaN(parseFloat(val)) && j > 0) {
        td.className = 'num';
        var num = parseFloat(val);
        td.textContent = num % 1 === 0 ? String(num) : num.toFixed(2);
      } else {
        td.textContent = val !== null && val !== undefined ? String(val) : '';
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);

function renderExportStats(data) {
  if (!data || !data.rows) return;
  var total = data.rows.length;
  var types = { raw: 0, finished: 0, sets: 0 };
  var withCost = 0, withPrice = 0;
  data.rows.forEach(function(row) {
    var isSet = String(row[11] || '').trim();
    var hasRaw = row[7] && String(row[7]).trim() !== '';
    if (isSet === 'Да') types.sets++;
    else if (!hasRaw) types.finished++;
    else types.raw++;
    if (parseFloat(row[14]) > 0) withCost++;
    if (parseFloat(row[15]) > 0) withPrice++;
  });
  document.getElementById('export-stats').innerHTML =
    '<span class="stat-item"><span class="stat-dot" style="background:#1a73e8"></span>Всего: ' + total + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#c5221f"></span>Сырьё: ' + types.raw + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#137333"></span>Готовый товар: ' + types.finished + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#9e9e9e"></span>Наборы: ' + types.sets + '</span>' +
    '<span class="stat-item">|</span>' +
    '<span class="stat-item">Себес 1С: <b>' + withCost + '</b></span>' +
    '<span class="stat-item">Цена пост.: <b>' + withPrice + '</b></span>';
}

function exportCSV() {
  if (!STATE.exportData || !STATE.exportData.rows.length) {
    setStatus('export-status', 'Нет данных для экспорта', 'error');
    return;
  }
  var csv = [STATE.exportData.headers.join(';')];
  STATE.exportData.rows.forEach(function(row) {
    csv.push(row.map(function(v) { return '"' + String(v || '').replace(/"/g, '""') + '"'; }).join(';'));
  });
  var blob = new Blob(['\uFEFF' + csv.join('\n')], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'export_1cData.csv'; a.click();
  URL.revokeObjectURL(url);
}

      '<td class="num">' + fmt(r.cost1C) + '</td>' +
      '<td class="num ' + diffClass + '">' + (r.diff > 0 ? '+' : '') + fmt(r.diff) + '</td>' +
      '<td class="num ' + diffClass + '">' + pctStr + '</td>';
    tbody.appendChild(tr);
  }
}

function filterCostTable() {
  var query = (document.getElementById('cost-search').value || '').toLowerCase();
  var typeFilter = document.getElementById('cost-type-filter').value;
  var rows = document.querySelectorAll('#cost-tbody tr');
  for (var i = 0; i < rows.length; i++) {
    var matchName = !query || (rows[i].getAttribute('data-name') || '').indexOf(query) >= 0;
    var matchType = !typeFilter || rows[i].getAttribute('data-type') === typeFilter;
    rows[i].style.display = (matchName && matchType) ? '' : 'none';
  }
}

function renderCostStats(results) {
  var totals = { raw: 0, finished: 0, flakons: 0, sets: 0, totalCost: 0, total1C: 0 };
  results.forEach(function(r) {
    if (r.type === 'Сырьё') totals.raw++;
    else if (r.type === 'Готовый товар') totals.finished++;
    else if (r.type === 'Флакон') totals.flakons++;
    else totals.sets++;
    totals.totalCost += r.total;
    totals.total1C   += r.cost1C;
  });
  document.getElementById('cost-stats').innerHTML =
    '<span class="stat-item"><span class="stat-dot" style="background:#c5221f"></span>Сырьё: ' + totals.raw + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#137333"></span>Гот.товар: ' + totals.finished + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#0b57d0"></span>Флаконы: ' + totals.flakons + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#9e9e9e"></span>Наборы: ' + totals.sets + '</span>' +
    '<span class="stat-item">|</span>' +
    '<span class="stat-item">Расчёт: <b>' + fmt(totals.totalCost) + '</b></span>' +
    '<span class="stat-item">1С: <b>' + fmt(totals.total1C) + '</b></span>';
}

function getCostSearchQuery() {
  var input = document.getElementById('cost-search');
  return input ? String(input.value || '').toLowerCase().trim() : '';
}

function getCostSearchHaystack(result) {
  return [
    String(result.name || ''),
    String(result.flakonName || ''),
    String(result.category || ''),
    String(result.type || '')
  ].join(' ').toLowerCase();
}

function getCostRawValue(result, key) {
  if (!result) return null;
  if (key === 'diffPct') return result.cost1C > 0 ? result.diffPct : null;
  return result[key];
}

function getCostDisplayValue(result, key) {
  var directTextKeys = {
    name: true,
    flakonName: true,
    category: true,
    group1: true,
    group2: true,
    group3: true,
    rawName: true,
    type: true
  };
  if (directTextKeys[key]) return String(result[key] || '');
  if (key === 'diffPct') return result.cost1C > 0 ? (result.diffPct * 100).toFixed(1) + '%' : '—';
  return fmt(result[key]);
}

function getCostFilterValue(result, key) {
  var display = getCostDisplayValue(result, key);
  return display === '—' ? '' : String(display).trim();
}

function getCostSortIndicator(key) {
  if (STATE.costSort.key !== key) return ' ↕';
  return STATE.costSort.dir === 'asc' ? ' ↑' : ' ↓';
}

function sanitizeCostFilters() {
  var valid = {};
  var results = STATE.calcResults || [];

  for (var i = 0; i < results.length; i++) {
    for (var j = 0; j < COST_SLICER_FIELDS.length; j++) {
      var slicer = COST_SLICER_FIELDS[j];
      var value = getCostFilterValue(results[i], slicer.key);
      if (!value) continue;
      if (!valid[slicer.key]) valid[slicer.key] = {};
      valid[slicer.key][value] = true;
    }
  }

  var next = {};
  for (var key in STATE.costFilters) {
    if (!STATE.costFilters.hasOwnProperty(key)) continue;
    var selected = STATE.costFilters[key];
    if (selected && valid[key] && valid[key][selected]) next[key] = selected;
  }
  STATE.costFilters = next;
}

function renderCostHeaders() {
  var thead = document.getElementById('cost-thead');
  if (!thead) return;
  thead.innerHTML = '';

  for (var i = 0; i < COST_COLUMNS.length; i++) {
    var col = COST_COLUMNS[i];
    var th = document.createElement('th');
    th.className = 'sortable-col';
    if (col.key === 'total') th.classList.add('col-total');
    th.textContent = col.label + getCostSortIndicator(col.key);
    th.setAttribute('data-key', col.key);
    th.addEventListener('click', function() {
      toggleCostSort(this.getAttribute('data-key'));
    });
    thead.appendChild(th);
  }
}

function buildCostSlicerDefs() {
  var results = STATE.calcResults || [];
  var defs = [];

  for (var i = 0; i < COST_SLICER_FIELDS.length; i++) {
    var col = COST_SLICER_FIELDS[i];
    var values = {};
    for (var j = 0; j < results.length; j++) {
      var value = getCostFilterValue(results[j], col.key);
      if (!value) continue;
      values[value] = true;
    }

    var options = Object.keys(values).sort(function(a, b) {
      var aNum = parseNumberV2(a);
      var bNum = parseNumberV2(b);
      if (col.numeric && aNum !== null && bNum !== null) return aNum - bNum;
      return a.localeCompare(b, 'ru', { sensitivity: 'base', numeric: true });
    });

    defs.push({
      key: col.key,
      label: col.label,
      options: options
    });
  }

  return defs;
}

function renderCostSlicers() {
  var host = document.getElementById('cost-slicers');
  if (!host) return;
  host.innerHTML = '';

  if (!STATE.calcResults || !STATE.calcResults.length) return;

  sanitizeCostFilters();
  var defs = buildCostSlicerDefs();
  for (var i = 0; i < defs.length; i++) {
    var def = defs[i];
    var wrap = document.createElement('div');
    wrap.className = 'export-slicer';

    var label = document.createElement('label');
    label.textContent = def.label;
    wrap.appendChild(label);

    var select = document.createElement('select');
    select.setAttribute('data-key', def.key);

    var allOpt = document.createElement('option');
    allOpt.value = '';
    allOpt.textContent = 'Все значения';
    select.appendChild(allOpt);

    for (var j = 0; j < def.options.length; j++) {
      var opt = document.createElement('option');
      opt.value = def.options[j];
      opt.textContent = def.options[j];
      if (STATE.costFilters[def.key] === def.options[j]) opt.selected = true;
      select.appendChild(opt);
    }

    select.addEventListener('change', function() {
      var key = this.getAttribute('data-key');
      if (this.value) STATE.costFilters[key] = this.value;
      else delete STATE.costFilters[key];
      renderCostRows(getFilteredCostResults());
    });

    wrap.appendChild(select);
    host.appendChild(wrap);
  }
}

function compareCostResults(a, b, key) {
  var av = getCostRawValue(a, key);
  var bv = getCostRawValue(b, key);
  var aNum = parseNumberV2(av);
  var bNum = parseNumberV2(bv);

  if (aNum !== null && bNum !== null) return aNum - bNum;

  var aText = String(getCostDisplayValue(a, key) || '').trim();
  var bText = String(getCostDisplayValue(b, key) || '').trim();
  if (!aText && !bText) return 0;
  if (!aText) return 1;
  if (!bText) return -1;
  return aText.localeCompare(bText, 'ru', { sensitivity: 'base', numeric: true });
}

function toggleCostSort(key) {
  if (STATE.costSort.key === key) {
    STATE.costSort.dir = STATE.costSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.costSort.key = key;
    STATE.costSort.dir = 'asc';
  }
  renderCostTable();
}

function getFilteredCostResults() {
  if (!STATE.calcResults || !STATE.calcResults.length) return [];

  var query = getCostSearchQuery();
  var typeFilter = document.getElementById('cost-type-filter').value;
  var out = [];

  for (var i = 0; i < STATE.calcResults.length; i++) {
    var result = STATE.calcResults[i];
    if (query && getCostSearchHaystack(result).indexOf(query) < 0) continue;
    if (typeFilter && result.type !== typeFilter) continue;

    var matches = true;
    for (var key in STATE.costFilters) {
      if (!STATE.costFilters.hasOwnProperty(key)) continue;
      if (getCostFilterValue(result, key) !== STATE.costFilters[key]) {
        matches = false;
        break;
      }
    }
    if (matches) out.push(result);
  }

  if (STATE.costSort.key) {
    out.sort(function(a, b) {
      var cmp = compareCostResults(a, b, STATE.costSort.key);
      return STATE.costSort.dir === 'asc' ? cmp : -cmp;
    });
  }

  return out;
}

function renderCostRows(results) {
  var tbody = document.getElementById('cost-tbody');
  tbody.innerHTML = '';

  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    var diffClass = r.diff > 0 ? 'diff-pos' : (r.diff < 0 ? 'diff-neg' : 'diff-zero');
    var badgeClass = getTypeBadgeClass(r.type);
    var tr = document.createElement('tr');
    tr.setAttribute('data-type', r.type);
    tr.setAttribute('data-name', getCostSearchHaystack(r));

    for (var j = 0; j < COST_COLUMNS.length; j++) {
      var col = COST_COLUMNS[j];
      var td = document.createElement('td');

      if (col.key === 'name' || col.key === 'flakonName' || col.key === 'category') {
        td.textContent = r.name || '';
        if (col.key === 'flakonName') td.textContent = r.flakonName || '';
        if (col.key === 'category') td.textContent = r.category || '';
      } else if (col.key === 'type') {
        td.innerHTML = '<span class="badge ' + badgeClass + '">' + esc(r.type) + '</span>';
      } else {
        var rawValue = getCostRawValue(r, col.key);
        td.className = 'num';
        td.textContent = getCostDisplayValue(r, col.key);
        if (col.key === 'total') td.classList.add('col-total');
        if (col.key === 'diff' || col.key === 'diffPct') td.classList.add(diffClass);
        if (rawValue !== null && parseNumberV2(rawValue) === 0) td.classList.add('zero-value');
      }

      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  }
}

function renderCostTable(results) {
  if (results) STATE.calcResults = results;

  if (typeof Tabulator === 'undefined') {
    // Vanilla fallback: use old render functions
    renderCostHeaders();
    renderCostSlicers();
    renderCostRows(getFilteredCostResults());
    return;
  }

  var data = STATE.calcResults || [];
  var columns = [];

  for (var i = 0; i < COST_COLUMNS.length; i++) {
    var col = COST_COLUMNS[i];
    var colDef = {
      title: col.label,
      field: col.key,
      headerSort: true,
      headerFilter: col.filterable ? (col.numeric ? 'number' : 'list') : false,
      resizable: true
    };

    if (col.key === 'name') {
      colDef.frozen = true;
      colDef.minWidth = 200;
      colDef.headerFilter = 'input';
      colDef.headerFilterPlaceholder = 'Поиск...';
    } else if (col.key === 'flakonName' || col.key === 'category') {
      colDef.minWidth = 120;
      colDef.headerFilter = 'input';
      colDef.headerFilterPlaceholder = 'Поиск...';
    } else if (col.key === 'type') {
      colDef.formatter = fmtTypeBadge;
      colDef.headerFilter = 'list';
      colDef.headerFilterParams = { values: { '': 'Все', 'Сырьё': 'Сырьё', 'Готовый товар': 'Готовый товар', 'Флакон': 'Флакон', 'Наборы': 'Наборы' } };
      colDef.minWidth = 120;
    } else if (col.key === 'total') {
      colDef.formatter = fmtNumber;
      colDef.formatterParams = { decimals: 2 };
      colDef.hozAlign = 'right';
      colDef.cssClass = 'col-total';
      colDef.minWidth = 100;
      colDef.headerFilter = false;
    } else if (col.key === 'diff') {
      colDef.hozAlign = 'right';
      colDef.headerFilter = false;
      colDef.minWidth = 90;
      colDef.formatter = function(cell) {
        var val = cell.getValue();
        if (val === null || val === undefined) return '';
        var cls = val > 0 ? 'diff-pos' : (val < 0 ? 'diff-neg' : 'diff-zero');
        return '<span class="' + cls + '">' + (val > 0 ? '+' : '') + fmt(val) + '</span>';
      };
    } else if (col.key === 'diffPct') {
      colDef.hozAlign = 'right';
      colDef.headerFilter = false;
      colDef.minWidth = 70;
      colDef.formatter = function(cell) {
        var row = cell.getRow().getData();
        if (!row.cost1C || row.cost1C === 0) return '—';
        var val = row.diffPct;
        var cls = row.diff > 0 ? 'diff-pos' : (row.diff < 0 ? 'diff-neg' : 'diff-zero');
        return '<span class="' + cls + '">' + (val * 100).toFixed(1) + '%</span>';
      };
    } else if (col.numeric) {
      colDef.formatter = fmtNumber;
      colDef.formatterParams = { decimals: 2 };
      colDef.hozAlign = 'right';
      colDef.minWidth = 85;
      colDef.headerFilter = false;
      colDef.cellClick = function(e, cell) {
        var val = cell.getValue();
        if (val !== null && val !== undefined && parseFloat(val) === 0) {
          cell.getElement().classList.add('zero-val');
        }
      };
    }

    columns.push(colDef);
  }

  if (STATE.tables.cost) {
    STATE.tables.cost.replaceData(data);
    return;
  }

  STATE.tables.cost = createTable('cost-table-container', columns, data, {
    height: '68vh',
    layout: 'fitDataFill',
    frozenRows: 0,
    placeholder: 'Выполните расчёт для отображения результатов',
    rowFormatter: function(row) {
      var d = row.getData();
      var cells = row.getCells();
      for (var i = 0; i < cells.length; i++) {
        var field = cells[i].getColumn().getField();
        if (field !== 'name' && field !== 'flakonName' && field !== 'category' && field !== 'type') {
          var val = cells[i].getValue();
          if (val !== null && val !== undefined && parseFloat(val) === 0 && field !== 'diff' && field !== 'diffPct') {
            cells[i].getElement().classList.add('zero-val');
          }
        }
      }
    }
  });
}

function filterCostTable() {
  // Tabulator handles filtering via built-in headerFilter
  if (STATE.tables.cost) return;
  // Vanilla fallback
  renderCostRows(getFilteredCostResults());
}

function exportCostExcel() {
  if (!STATE.calcResults || !STATE.calcResults.length) {
    setStatus('cost-status', 'Сначала выполните расчёт', 'error');
    return;
  }

  loadXLSX(function() {
    var rows = [];
    var headers = [];

    for (var i = 0; i < COST_COLUMNS.length; i++) headers.push(COST_COLUMNS[i].label);
    rows.push(headers);

    for (var j = 0; j < STATE.calcResults.length; j++) {
      var r = STATE.calcResults[j];
      var row = [];
      for (var k = 0; k < COST_COLUMNS.length; k++) {
        var key = COST_COLUMNS[k].key;
        if (key === 'diffPct') row.push(r.cost1C > 0 ? r.diffPct : '');
        else row.push(getCostRawValue(r, key));
      }
      rows.push(row);
    }

    var wb = XLSX.utils.book_new();
    var ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Себестоимость');
    XLSX.writeFile(wb, 'cost_results.xlsx');
  });
}

function saveResultsUI() {
  if (!STATE.calcResults || STATE.calcResults.length === 0) {
    setStatus('cost-status', 'Сначала выполните расчёт', 'error');
    return;
  }
  showLoading();
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoading();
      setStatus('cost-status', 'Записано ' + res.count + ' строк на лист "' + res.sheetName + '"', 'success');
    })
    .withFailureHandler(function(err) {
      hideLoading();
      setStatus('cost-status', 'Ошибка: ' + err.message, 'error');
    })
    .saveResults(STATE.calcResults, getParamsFromUI());
}

function populateCalcSelects() {
  if (!STATE.exportData || !STATE.exportData.rows) return;
  var sel = document.getElementById('calc-select');
  var flSel = document.getElementById('calc-flakon');
  if (sel.options.length <= 1) {
    STATE.exportData.rows.forEach(function(row, i) {
      if (row[0]) {
        var opt = document.createElement('option');
        opt.value = i; opt.textContent = row[0];
        sel.appendChild(opt);
      }
    });
  }
  if (flSel.options.length <= 1 && STATE.flakons.length > 0) {
    STATE.flakons.forEach(function(f) {
      var opt = document.createElement('option');
      opt.value = f.name; opt.textContent = f.name;
      flSel.appendChild(opt);
    });
  }
}

function onCalcSelect() {
  var idx = document.getElementById('calc-select').value;
  if (idx === '' || !STATE.exportData) return;
  var row = STATE.exportData.rows[parseInt(idx)];
  if (!row) return;

  var isSet  = String(row[11] || '').trim();
  var hasRaw = row[7] && String(row[7]).trim() !== '';
  var type = isSet === 'Да' ? 'Наборы' : (!hasRaw ? 'Готовый товар' : 'Сырьё');

  document.getElementById('calc-type').value    = type;
  document.getElementById('calc-price').value   = parseFloat(row[15]) || 0; // COL.PRICE = 15
  document.getElementById('calc-vol').value     = parseFloat(row[4])  || 0;
  document.getElementById('calc-weight').value  = parseFloat(row[12]) || 0;
  document.getElementById('calc-flakon').value  = String(row[8] || '').trim();
  document.getElementById('calc-cost1c').value  = parseFloat(row[14]) || 0; // COL.COST_1C = 14
  calcManual();
}

function calcManual() {
  var p = getCalcRuntimeParams();
  var nds = getNumericInputValue('calc-nds', 0.22);
  var tax = getNumericInputValue('calc-tax', 0.065);
  var selectedIdx = document.getElementById('calc-select').value;
  var selectedRow = selectedIdx !== '' && STATE.exportData && STATE.exportData.rows
    ? STATE.exportData.rows[parseInt(selectedIdx, 10)]
    : null;
  var selectedName = selectedRow ? String(selectedRow[0] || '').trim() : '';
  var currentFlakonName = document.getElementById('calc-flakon').value || '';
  var input = {
    name:       selectedName || currentFlakonName || 'Ручной расчёт',
    type:       document.getElementById('calc-type').value,
    price:      parseFloat(document.getElementById('calc-price').value)  || 0,
    volume:     parseFloat(document.getElementById('calc-vol').value)    || 0,
    weight:     parseFloat(document.getElementById('calc-weight').value) || 0,
    flakonName: currentFlakonName,
    cost1C:     parseFloat(document.getElementById('calc-cost1c').value) || 0,
    usd: p.usd, rmb: p.rmb, log: p.log, com: p.com, logFl: p.logFl, comFl: p.comFl,
    ndsRate: nds, taxRate: tax,
    manualFlakon: {
      supplierPrice: getOptionalNumericInputValue('calc-fl-price'),
      weight: getOptionalNumericInputValue('calc-fl-weight'),
      nds: getOptionalNumericInputValue('calc-fl-nds'),
      tax: getOptionalNumericInputValue('calc-fl-tax'),
      label: getOptionalNumericInputValue('calc-fl-label')
    }
  };
  google.script.run
    .withSuccessHandler(function(res) { renderCalcResult(res); })
    .calculateManual(input);
}

function formatPctValue_(value, total) {
  if (!total || total <= 0) return '0.0%';
  return ((value / total) * 100).toFixed(1) + '%';
}

function buildCalcShareGroups_(result) {
  var total = parseFloat(result && result.total) || 0;
  var rawTotal = (parseFloat(result.raw) || 0) + (parseFloat(result.delivery) || 0) + (parseFloat(result.taxDuty) || 0);
  var flakonTotal = (parseFloat(result.rawFl) || 0) + (parseFloat(result.deliveryFl) || 0) + (parseFloat(result.taxDutyFl) || 0);
  var labelTotal = parseFloat(result.label) || 0;

  return [
    {
      key: 'raw',
      title: 'Сырьевой контур',
      total: rawTotal,
      color: '#c2410c',
      subs: [
        { title: 'Сырьё', value: parseFloat(result.raw) || 0, color: '#ea580c' },
        { title: 'Доставка сырья', value: parseFloat(result.delivery) || 0, color: '#fb923c' },
        { title: 'Налоги и пошлины', value: parseFloat(result.taxDuty) || 0, color: '#fdba74' }
      ]
    },
    {
      key: 'flakon',
      title: 'Флакон и тара',
      total: flakonTotal,
      color: '#0369a1',
      subs: [
        { title: 'Цена флакона', value: parseFloat(result.rawFl) || 0, color: '#0284c7' },
        { title: 'Доставка флакона', value: parseFloat(result.deliveryFl) || 0, color: '#38bdf8' },
        { title: 'НДС и пошлина флакона', value: parseFloat(result.taxDutyFl) || 0, color: '#7dd3fc' }
      ]
    },
    {
      key: 'label',
      title: 'Этикетка',
      total: labelTotal,
      color: '#6d28d9',
      subs: [
        { title: 'Этикетка', value: labelTotal, color: '#8b5cf6' }
      ]
    }
  ].map(function(group) {
    group.pct = total > 0 ? (group.total / total) * 100 : 0;
    return group;
  });
}

function buildCalcResultHtml_(payload) {
  var result = payload.result || {};
  var diffClass = result.diff > 0 ? 'diff-pos' : (result.diff < 0 ? 'diff-neg' : 'diff-zero');
  var total = parseFloat(result.total) || 0;
  var flakonTotal = parseFloat(result.totalFl) || 0;
  var summaryHtml =
    '<div class="calc-summary-grid">' +
      '<div class="calc-summary-card">' +
        '<span class="calc-summary-label">Итого</span>' +
        '<strong>' + fmt(total) + ' ₽</strong>' +
        '<div class="calc-summary-note">Полная себестоимость позиции</div>' +
      '</div>' +
      '<div class="calc-summary-card">' +
        '<span class="calc-summary-label">Тип</span>' +
        '<strong>' + esc(result.type || payload.type || '—') + '</strong>' +
        '<div class="calc-summary-note">Определён по текущим полям</div>' +
      '</div>' +
      '<div class="calc-summary-card">' +
        '<span class="calc-summary-label">Себестоимость флакона</span>' +
        '<strong>' + fmt(flakonTotal) + ' ₽</strong>' +
        '<div class="calc-summary-note">Сумма упаковочного контура</div>' +
      '</div>' +
      '<div class="calc-summary-card">' +
        '<span class="calc-summary-label">Сравнение с 1С</span>' +
        '<strong class="' + diffClass + '">' + (result.cost1C > 0 ? ((result.diff > 0 ? '+' : '') + fmt(result.diff)) : '—') + '</strong>' +
        '<div class="calc-summary-note">' + (result.cost1C > 0 ? ('1С: ' + fmt(result.cost1C) + ' ₽') : 'Значение 1С не задано') + '</div>' +
      '</div>' +
    '</div>';

  var tableHtml =
    '<table>' +
      '<tr><td>Тип</td><td><b>' + esc(result.type || payload.type || '') + '</b></td></tr>' +

function buildCalcVisualHtml_(result) {
  var total = parseFloat(result && result.total) || 0;
  var groups = buildCalcShareGroups_(result).filter(function(group) { return group.total > 0; });
  if (!groups.length || total <= 0) {
    return '<p class="hint">После расчёта здесь появится структура затрат по долям и вложенным статьям.</p>';
  }

  var html =
    '<div class="calc-visual-head">' +
      '<div>' +
        '<h3>Структура затрат</h3>' +
        '<p class="calc-visual-subtitle">Верхний уровень показывает долю крупных контуров, внутри каждого блока раскрыты младшие статьи.</p>' +
      '</div>' +
      '<div class="calc-summary-note">База для долей: ' + fmt(total) + ' ₽</div>' +
    '</div>' +
    '<div class="calc-share-list">';

  for (var i = 0; i < groups.length; i++) {
    var group = groups[i];
    html +=
      '<div class="calc-share-card">' +
        '<div class="calc-share-header">' +
          '<div class="calc-share-title">' + esc(group.title) + '</div>' +
          '<div class="calc-share-values">' +
            '<span class="calc-share-sum">' + fmt(group.total) + ' ₽</span>' +
            '<span class="calc-share-pct">' + formatPctValue_(group.total, total) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="calc-share-bar">';

    for (var s = 0; s < group.subs.length; s++) {
      var sub = group.subs[s];
      if (sub.value <= 0) continue;
      html += '<span class="calc-share-fill" style="width:' + (group.total > 0 ? ((sub.value / group.total) * 100).toFixed(2) : 0) + '%; background:' + sub.color + '"></span>';
    }

    html +=
        '</div>' +
        '<div class="calc-subshare-list">';

    for (var j = 0; j < group.subs.length; j++) {
      var item = group.subs[j];
      if (item.value <= 0) continue;
      html +=
        '<div class="calc-subshare-row">' +
          '<div class="calc-subshare-label">' + esc(item.title) + '</div>' +
          '<div class="calc-subshare-track"><div class="calc-subshare-fill" style="width:' + (group.total > 0 ? ((item.value / group.total) * 100).toFixed(2) : 0) + '%; background:' + item.color + '"></div></div>' +
          '<div class="calc-subshare-value">' + fmt(item.value) + ' ₽ · ' + formatPctValue_(item.value, total) + '</div>' +
        '</div>';
    }

    html +=
        '</div>' +
      '</div>';
  }

  html += '</div>';
  return html;
}

  if (n === null || n === undefined || n === '') return '—';

  return num.toFixed(2);
}

function esc(s) {
  if (!s && s !== 0) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

STATE.importSettings = STATE.importSettings || null;
STATE.importCtx = STATE.importCtx || null;

function ensureImportSettings(callback) {
  if (STATE.importSettings) {
    if (callback) callback();
    return;
  }
  google.script.run
    .withSuccessHandler(function(settings) {
      STATE.importSettings = settings || {
        mappings: { nomenclature: null, cost: null, supplier: null },
        rateDefaults: { nds: 0.22, tax: 0.065 }
      };
      if (callback) callback();
    })
    .withFailureHandler(function(err) {
      STATE.importSettings = {
        mappings: { nomenclature: null, cost: null, supplier: null },
        rateDefaults: { nds: 0.22, tax: 0.065 }
      };
      setStatus('export-status', 'Не удалось загрузить настройки импорта: ' + err.message, 'error');
      if (callback) callback();
    })
    .getImportSettings();
}

function getSavedMappingV2(type) {
  if (!STATE.importSettings || !STATE.importSettings.mappings) return null;
  return STATE.importSettings.mappings[type] || null;
}

function normalizeKeyV2(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[._]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function isValidIndexV2(index, length) {
  return typeof index === 'number' && !isNaN(index) && index >= 0 && index < length;
}

function colLabelV2(index) {
  var n = index + 1;
  var out = '';
  while (n > 0) {
    var rem = (n - 1) % 26;
    out = String.fromCharCode(65 + rem) + out;
    n = Math.floor((n - 1) / 26);
  }
  return out;
}

function parseNumberV2(value) {
  if (value === null || value === undefined || value === '') return null;
  var parsed = parseFloat(String(value).replace(/\s+/g, '').replace(',', '.'));
  return isNaN(parsed) ? null : parsed;
}

function toNumberSafe(value, fallback) {
  var parsed = parseNumberV2(value);
  return parsed === null ? fallback : parsed;
}

function startImport(type) {
  ensureImportSettings(function() {
    if (!IMPORT_CFG_V2[type]) {
      setStatus('export-status', 'Неизвестный тип импорта.', 'error');
      return;
    }
    if (typeof XLSX === 'undefined') {
      setStatus('export-status', 'SheetJS не найден. Проверьте SheetJsLib.html.', 'error');
      return;
    }

    STATE.importCtx = {
      type: type,
      workbook: null,
      fileName: '',
      sheetName: '',
      headerRow: 1,
      headers: [],
      dataRows: [],
      mapping: {}
    };

    var saved = getSavedMappingV2(type);
    if (saved && saved.headerRow) {
      var parsed = parseInt(saved.headerRow, 10);
      if (parsed > 0) STATE.importCtx.headerRow = parsed;
    }

    var fi = document.getElementById('import-file-input');
    fi.value = '';
    fi.click();
  });
}

function handleImportFileSelected(event) {
  var input = event.target;
  if (!input.files || !input.files[0] || !STATE.importCtx) return;
  var file = input.files[0];

  showLoading();
  setStatus('export-status', 'Читаю файл: ' + file.name + '...', 'info');

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), {
        type: 'array',
        raw: false,
        cellDates: false,
        codepage: 1251
      });
      if (!wb || !wb.SheetNames || wb.SheetNames.length === 0) {
        throw new Error('В файле не найдено листов.');
      }

      STATE.importCtx.workbook = wb;
      STATE.importCtx.fileName = file.name;
      STATE.importCtx.sheetName = wb.SheetNames[0];

      var saved = getSavedMappingV2(STATE.importCtx.type);
      if (saved && saved.sheetName) {
        for (var i = 0; i < wb.SheetNames.length; i++) {
          if (normalizeKeyV2(wb.SheetNames[i]) === normalizeKeyV2(saved.sheetName)) {
            STATE.importCtx.sheetName = wb.SheetNames[i];
            break;
          }
        }
      }

      openImportModalV2();
      hideLoading();
    } catch (err) {
      hideLoading();
      setStatus('export-status', 'Ошибка чтения файла: ' + err.message, 'error');
    }
  };
  reader.onerror = function() {
    hideLoading();
    setStatus('export-status', 'Ошибка чтения файла.', 'error');
  };
  reader.readAsArrayBuffer(file);
}

function openImportModalV2() {

function refreshImportPreview() {
  if (!STATE.importCtx || !STATE.importCtx.workbook) return;

  STATE.importCtx.sheetName = document.getElementById('import-sheet-select').value;
  STATE.importCtx.headerRow = parseInt(document.getElementById('import-header-row').value, 10) || 1;
  if (STATE.importCtx.headerRow < 1) STATE.importCtx.headerRow = 1;

  var ws = STATE.importCtx.workbook.Sheets[STATE.importCtx.sheetName];
  if (!ws) return;
  var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
  if (!rows || rows.length === 0) rows = [[]];

  var headerIdx = STATE.importCtx.headerRow - 1;
  var rawHeaders = rows[headerIdx] || [];
  var headers = [];
  for (var i = 0; i < rawHeaders.length; i++) {
    headers.push(String(rawHeaders[i] || '').trim() || ('Колонка ' + colLabelV2(i)));
  }
  STATE.importCtx.headers = headers;
  STATE.importCtx.dataRows = rows.slice(STATE.importCtx.headerRow).filter(function(row) {
    if (!row) return false;
    for (var j = 0; j < row.length; j++) {
      if (String(row[j] || '').trim() !== '') return true;
    }
    return false;
  });

  STATE.importCtx.mapping = buildMappingV2();
  renderMappingControlsV2();
  renderImportPreviewV2();

  document.getElementById('import-modal-subtitle').textContent =
    'Файл: ' + STATE.importCtx.fileName + ' · Лист: ' + STATE.importCtx.sheetName +
    ' · Строк данных: ' + STATE.importCtx.dataRows.length;
}

function buildMappingV2() {
  var cfg = IMPORT_CFG_V2[STATE.importCtx.type];
  var headers = STATE.importCtx.headers;
  var saved = getSavedMappingV2(STATE.importCtx.type);
  var current = {};

  for (var i = 0; i < cfg.fields.length; i++) {
    var key = cfg.fields[i].key;
    var sel = document.getElementById('map-' + key);
    if (sel) current[key] = parseInt(sel.value, 10);
  }

  var mapping = {};
  for (var f = 0; f < cfg.fields.length; f++) {
    var field = cfg.fields[f];
    var best = -1;
    if (isValidIndexV2(current[field.key], headers.length)) {
      best = current[field.key];
    } else if (saved && saved.fields && saved.fields[field.key]) {
      var savedField = saved.fields[field.key];
      if (savedField.header) {
        var targetHeader = normalizeKeyV2(savedField.header);
        for (var h = 0; h < headers.length; h++) {
          if (normalizeKeyV2(headers[h]) === targetHeader) { best = h; break; }
        }
      }
      if (best < 0 && isValidIndexV2(parseInt(savedField.index, 10), headers.length)) {
        best = parseInt(savedField.index, 10);
      }
    }
    if (best < 0) {
      for (var hintIdx = 0; hintIdx < field.hints.length; hintIdx++) {
        var hint = normalizeKeyV2(field.hints[hintIdx]);
        for (var j = 0; j < headers.length; j++) {
          if (normalizeKeyV2(headers[j]).indexOf(hint) >= 0) { best = j; break; }
        }
        if (best >= 0) break;
      }
    }
    mapping[field.key] = best;
  }
  return mapping;
}

function renderMappingControlsV2() {
  var cfg = IMPORT_CFG_V2[STATE.importCtx.type];
  var headers = STATE.importCtx.headers;
  var html = '';

  for (var i = 0; i < cfg.fields.length; i++) {
    var field = cfg.fields[i];
    html += '<div class="mapping-row">';
    html += '<div><div class="mapping-label' + (field.required ? ' required' : '') + '">' + esc(field.label) + '</div>';
    html += '<div class="mapping-hint">Сопоставление колонки файла</div></div>';
    html += '<select id="map-' + field.key + '" class="mapping-select" onchange="onMappingChangedV2(\'' + field.key + '\', this.value)">';
    html += '<option value="-1">— Не импортировать —</option>';
    for (var j = 0; j < headers.length; j++) {
      var selected = STATE.importCtx.mapping[field.key] === j ? ' selected' : '';
      html += '<option value="' + j + '"' + selected + '>' + colLabelV2(j) + ': ' + esc(headers[j]) + '</option>';
    }
    html += '</select>';
    html += '</div>';
  }

  document.getElementById('import-mapping-grid').innerHTML = html;
}

function onMappingChangedV2(key, value) {
  STATE.importCtx.mapping[key] = parseInt(value, 10);
  renderImportPreviewV2();
}

function renderImportPreviewV2() {
  var headers = STATE.importCtx.headers;
  var rows = STATE.importCtx.dataRows;
  var mappedCols = {};
  for (var key in STATE.importCtx.mapping) {
    if (!STATE.importCtx.mapping.hasOwnProperty(key)) continue;
    var idx = STATE.importCtx.mapping[key];
    if (isValidIndexV2(idx, headers.length)) mappedCols[idx] = true;
  }

  var thead = document.getElementById('import-preview-head');
  var tbody = document.getElementById('import-preview-body');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  var headRow = document.createElement('tr');
  for (var i = 0; i < headers.length; i++) {
    var th = document.createElement('th');
    th.textContent = colLabelV2(i) + ': ' + headers[i];
    if (mappedCols[i]) th.style.background = '#dce8ff';
    headRow.appendChild(th);
  }
  thead.appendChild(headRow);

  var previewCount = Math.min(rows.length, 20);
  if (previewCount === 0) {
    var trEmpty = document.createElement('tr');
    var tdEmpty = document.createElement('td');
    tdEmpty.colSpan = Math.max(headers.length, 1);
    tdEmpty.textContent = 'Нет строк данных для предпросмотра.';
    trEmpty.appendChild(tdEmpty);
    tbody.appendChild(trEmpty);
    return;
  }

  for (var r = 0; r < previewCount; r++) {
    var tr = document.createElement('tr');
    var row = rows[r] || [];
    for (var c = 0; c < headers.length; c++) {
      var td = document.createElement('td');
      td.textContent = row[c] === null || row[c] === undefined ? '' : String(row[c]);
      if (mappedCols[c]) td.style.background = '#f5f9ff';
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

function confirmImport() {
  if (!STATE.importCtx) return;
  var cfg = IMPORT_CFG_V2[STATE.importCtx.type];
  var mapping = {};
  for (var i = 0; i < cfg.fields.length; i++) {
    var key = cfg.fields[i].key;
    var sel = document.getElementById('map-' + key);
    mapping[key] = sel ? parseInt(sel.value, 10) : -1;
  }

  for (var req = 0; req < cfg.fields.length; req++) {
    if (cfg.fields[req].required && !isValidIndexV2(mapping[cfg.fields[req].key], STATE.importCtx.headers.length)) {
      showAlert('Внимание', 'Не заполнено обязательное поле: ' + cfg.fields[req].label);
      return;
    }
  }
  if ((STATE.importCtx.type === 'cost' || STATE.importCtx.type === 'supplier') &&
      !isValidIndexV2(mapping.name, STATE.importCtx.headers.length) &&
      !isValidIndexV2(mapping.article, STATE.importCtx.headers.length)) {
    showAlert('Внимание', 'Для сопоставления укажите колонку Номенклатура или Артикул.');
    return;
  }

  var payload;
  if (STATE.importCtx.type === 'nomenclature') {
    var rows = [];
    for (var r = 0; r < STATE.importCtx.dataRows.length; r++) {
      var src = STATE.importCtx.dataRows[r];
      var item = {};
      for (var f = 0; f < cfg.fields.length; f++) {
        var field = cfg.fields[f];
        var idx = mapping[field.key];
        item[field.key] = isValidIndexV2(idx, STATE.importCtx.headers.length) ? String(src[idx] || '').trim() : '';
      }
      if (!item.name) continue;
      rows.push(item);
    }
    if (!rows.length) {
      showAlert('Внимание', 'После фильтрации не осталось строк с номенклатурой.');
      return;
    }
    payload = {
      rows: rows,
      defaults: {
        nds: toNumberSafe(document.getElementById('import-default-nds').value, 0.22),
        tax: toNumberSafe(document.getElementById('import-default-tax').value, 0.065)
      },
      mapping: buildMappingPayloadV2(mapping)
    };
  } else {
    var mappedRows = [];
    for (var iRow = 0; iRow < STATE.importCtx.dataRows.length; iRow++) {
      var srcRow = STATE.importCtx.dataRows[iRow];
      var name = isValidIndexV2(mapping.name, STATE.importCtx.headers.length) ? String(srcRow[mapping.name] || '').trim() : '';
      var article = isValidIndexV2(mapping.article, STATE.importCtx.headers.length) ? String(srcRow[mapping.article] || '').trim() : '';
      var value = isValidIndexV2(mapping.value, STATE.importCtx.headers.length) ? parseNumberV2(srcRow[mapping.value]) : null;
      if (!name && !article) continue;
      if (value === null) continue;
      mappedRows.push({ name: name, article: article, value: value });
    }
    if (!mappedRows.length) {
      showAlert('Внимание', 'Не найдено валидных строк для импорта.');
      return;
    }
    payload = {
      rows: mappedRows,
      mapping: buildMappingPayloadV2(mapping)
    };
  }

  closeImportModal();
  showLoading();
  setStatus('export-status', 'Импортирую данные...', 'info');

  var runner = google.script.run
    .withSuccessHandler(function(res) {
      hideLoading();
      if (!res || !res.success) {
        setStatus('export-status', (res && res.message) || 'Импорт завершился с ошибкой.', 'error');
        return;
      }
      STATE.importSettings = STATE.importSettings || { mappings: {}, rateDefaults: { nds: 0.22, tax: 0.065 } };
      STATE.importSettings.mappings[STATE.importCtx.type] = payload.mapping;
      if (STATE.importCtx.type === 'nomenclature') {
        STATE.importSettings.rateDefaults = { nds: payload.defaults.nds, tax: payload.defaults.tax };
      }
      var details = '';
      if (res.matchedByName !== undefined || res.matchedByArticle !== undefined) {
        details = ' (по наименованию: ' + (res.matchedByName || 0) + ', по артикулу: ' + (res.matchedByArticle || 0) + ')';
      }
      setStatus('export-status', res.message + details, 'success');
      loadExportData();
    })
    .withFailureHandler(function(err) {
      hideLoading();
      setStatus('export-status', 'Ошибка импорта: ' + err.message, 'error');
    });

  if (cfg.endpoint === 'importBaseNomenclature') runner.importBaseNomenclature(payload);
  if (cfg.endpoint === 'importCurrentCost') runner.importCurrentCost(payload);
  if (cfg.endpoint === 'importSupplierPriceData') runner.importSupplierPriceData(payload);
}

function buildMappingPayloadV2(mapping) {
  var fields = {};
  for (var key in mapping) {
    if (!mapping.hasOwnProperty(key)) continue;
    var idx = mapping[key];
    fields[key] = {
      index: isValidIndexV2(idx, STATE.importCtx.headers.length) ? idx : -1,
      header: isValidIndexV2(idx, STATE.importCtx.headers.length) ? STATE.importCtx.headers[idx] : ''
    };
  }
  return {
    fileName: STATE.importCtx.fileName,
    sheetName: STATE.importCtx.sheetName,
    headerRow: STATE.importCtx.headerRow,
    fields: fields
  };
}

// EXPORT_PRICE_COL already defined above (line ~509)
var EXPORT_PRIORITY_ORDER = [0, 1, 2, 3, 4, 5, 15, 16, 17];
var EXPORT_SLICER_EXCLUDED = {
  0: true,   // Номенклатура
  1: true,   // Артикул
  2: true,   // Артикул ВБ
  15: true   // Цена поставщика

STATE.exportFilters = STATE.exportFilters || {};
STATE.exportSort = STATE.exportSort || { sourceCol: null, dir: 'asc' };

function getExportColCountV3(data) {
  if (!data || !data.headers) return 0;
  return Math.min(data.headers.length, EXPORT_SCHEMA_COLS);
}

function getExportDisplayOrderV3(data) {
  var colCount = getExportColCountV3(data);
  var order = [];
  var seen = {};

  for (var i = 0; i < EXPORT_PRIORITY_ORDER.length; i++) {
    var priorityCol = EXPORT_PRIORITY_ORDER[i];
    if (priorityCol < colCount && !seen[priorityCol]) {
      order.push(priorityCol);
      seen[priorityCol] = true;
    }
  }

  for (var c = 0; c < colCount; c++) {
    if (!seen[c]) order.push(c);
  }

  return order;
}

function getVisibleExportHeadersV3(data) {
  var headers = data && data.headers ? data.headers : [];
  var order = getExportDisplayOrderV3(data);
  var out = [];
  for (var i = 0; i < order.length; i++) {
    out.push(headers[order[i]]);
  }
  return out;
}

function getVisibleExportRowV3(row, data) {
  var out = [];
  var order = getExportDisplayOrderV3(data);
  for (var i = 0; i < order.length; i++) out.push(row[order[i]]);
  return out;
}

function normalizeExportValueV3(value) {
  if (value === null || value === undefined) return '';
  return String(value).trim();
}

function isFilterableExportColV3(index) {
  return !EXPORT_SLICER_EXCLUDED[index];
}

function getExportSearchQueryV3() {
  var input = document.getElementById('export-search');
  return input ? String(input.value || '').toLowerCase().trim() : '';
}

function getExportSearchHaystackV3(row) {
  return [
    normalizeExportValueV3(row[0]),
    normalizeExportValueV3(row[1]),
    normalizeExportValueV3(row[2])
  ].join(' ').toLowerCase();
}

function getSortIndicatorV3(sourceCol) {
  if (STATE.exportSort.sourceCol !== sourceCol) return ' ↕';
  return STATE.exportSort.dir === 'asc' ? ' ↑' : ' ↓';
}

function applyExportStickyColumnsV3() {
  var headerCells = document.querySelectorAll('#export-thead th');
  if (!headerCells.length) return;

  var stickyCount = Math.min(EXPORT_STICKY_COLS, headerCells.length);
  var offsets = [];
  var left = 0;

  for (var i = 0; i < stickyCount; i++) {
    offsets.push(left);
    left += headerCells[i].offsetWidth;
  }

  for (var h = 0; h < stickyCount; h++) {
    headerCells[h].classList.add('sticky-col');
    headerCells[h].style.left = offsets[h] + 'px';
    headerCells[h].style.zIndex = String(10 - h);
  }

  var rows = document.querySelectorAll('#export-tbody tr');
  for (var r = 0; r < rows.length; r++) {
    var cells = rows[r].children;
    for (var c = 0; c < stickyCount && c < cells.length; c++) {
      cells[c].classList.add('sticky-col');
      cells[c].style.left = offsets[c] + 'px';
      cells[c].style.zIndex = '2';
    }
  }
}

function toggleExportSortV3(sourceCol) {
  if (STATE.exportSort.sourceCol === sourceCol) {
    STATE.exportSort.dir = STATE.exportSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.exportSort.sourceCol = sourceCol;
    STATE.exportSort.dir = 'asc';
  }
  renderExportTable(STATE.exportData);
}

function compareExportValuesV3(a, b, sourceCol) {
  var av = a.row[sourceCol];
  var bv = b.row[sourceCol];
  var aText = normalizeExportValueV3(av);
  var bText = normalizeExportValueV3(bv);
  var aNum = parseNumberV2(av);
  var bNum = parseNumberV2(bv);

  if (aText === '' && bText === '') return 0;
  if (aText === '') return 1;
  if (bText === '') return -1;

  if (EXPORT_NUMERIC_COLS[sourceCol] || sourceCol === EXPORT_NDS_COL || sourceCol === EXPORT_TAX_COL) {
    if (aNum !== null && bNum !== null) return aNum - bNum;
  }

  return aText.localeCompare(bText, 'ru', { sensitivity: 'base', numeric: true });
}

function sanitizeExportFiltersV3(data) {
  var rows = data && data.rows ? data.rows : [];
  var valid = {};

  for (var i = 0; i < rows.length; i++) {
    var row = getVisibleExportRowV3(rows[i], data);
    var order = getExportDisplayOrderV3(data);
    for (var c = 0; c < order.length; c++) {
      if (!isFilterableExportColV3(order[c])) continue;
      var key = normalizeExportValueV3(row[c]);
      if (!key) continue;
      if (!valid[c]) valid[c] = {};
      valid[c][key] = true;
    }
  }

  var next = {};
  for (var filterCol in STATE.exportFilters) {
    if (!STATE.exportFilters.hasOwnProperty(filterCol)) continue;
    var value = STATE.exportFilters[filterCol];
    if (!value) continue;
    if (valid[filterCol] && valid[filterCol][value]) next[filterCol] = value;
  }
  STATE.exportFilters = next;
}

function buildExportSlicerDefsV3(data) {
  var headers = getVisibleExportHeadersV3(data);
  var rows = data && data.rows ? data.rows : [];
  var order = getExportDisplayOrderV3(data);
  var defs = [];

  for (var c = 0; c < headers.length; c++) {
    if (!isFilterableExportColV3(order[c])) continue;
    var values = {};
    for (var r = 0; r < rows.length; r++) {
      var value = normalizeExportValueV3(rows[r][order[c]]);
      if (!value) continue;
      values[value] = true;
    }

    var options = Object.keys(values).sort(function(a, b) {
      return a.localeCompare(b, 'ru', { sensitivity: 'base', numeric: true });
    });

    defs.push({
      index: c,
      label: headers[c],
      options: options
    });
  }

  return defs;
}

function renderExportSlicersV3(data) {
  var host = document.getElementById('export-slicers');
  if (!host) return;
  host.innerHTML = '';

  if (!data || !data.rows || data.rows.length === 0) return;

  sanitizeExportFiltersV3(data);
  var defs = buildExportSlicerDefsV3(data);
  if (!defs.length) return;

  for (var i = 0; i < defs.length; i++) {
    var def = defs[i];
    var wrap = document.createElement('div');
    wrap.className = 'export-slicer';

    var label = document.createElement('label');
    label.textContent = def.label;
    wrap.appendChild(label);

    var select = document.createElement('select');
    select.setAttribute('data-col', def.index);

    var allOpt = document.createElement('option');
    allOpt.value = '';
    allOpt.textContent = 'Все значения';
    select.appendChild(allOpt);

    for (var j = 0; j < def.options.length; j++) {
      var opt = document.createElement('option');
      opt.value = def.options[j];
      opt.textContent = def.options[j];
      if (STATE.exportFilters[String(def.index)] === def.options[j]) opt.selected = true;
      select.appendChild(opt);
    }

    select.addEventListener('change', function() {
      var colIndex = String(this.getAttribute('data-col'));
      if (this.value) STATE.exportFilters[colIndex] = this.value;
      else delete STATE.exportFilters[colIndex];
      renderExportRows(getFilteredExportEntriesV3());
    });

    wrap.appendChild(select);
    host.appendChild(wrap);
  }
}

function getFilteredExportEntriesV3() {
  if (!STATE.exportData || !STATE.exportData.rows) return [];

  var rows = STATE.exportData.rows;
  var query = getExportSearchQueryV3();
  var entries = [];

  for (var i = 0; i < rows.length; i++) {
    var visibleRow = getVisibleExportRowV3(rows[i], STATE.exportData);
    if (query && getExportSearchHaystackV3(visibleRow).indexOf(query) < 0) continue;

    var matches = true;
    for (var filterCol in STATE.exportFilters) {
      if (!STATE.exportFilters.hasOwnProperty(filterCol)) continue;
      var filterValue = STATE.exportFilters[filterCol];
      if (!filterValue) continue;
      if (normalizeExportValueV3(visibleRow[parseInt(filterCol, 10)]) !== filterValue) {
        matches = false;
        break;
      }
    }
    if (!matches) continue;

    entries.push({
      index: i,
      row: rows[i],
      visibleRow: visibleRow
    });
  }

  if (STATE.exportSort.sourceCol !== null && STATE.exportSort.sourceCol !== undefined) {
    entries.sort(function(a, b) {
      var result = compareExportValuesV3(a, b, STATE.exportSort.sourceCol);
      return STATE.exportSort.dir === 'asc' ? result : -result;
    });
  }

  return entries;
}

function renderExportStats(data) {
  if (!data || !data.rows) return;

  var total = data.rows.length;
  var types = { raw: 0, finished: 0, sets: 0 };
  var withCost = 0;
  var withPrice = 0;

  for (var i = 0; i < data.rows.length; i++) {

    if (parseNumberV2(row[14]) !== null && parseNumberV2(row[14]) > 0) withCost++;

    '<span class="stat-item"><span class="stat-dot" style="background:#c5221f"></span>Сырьё: ' + types.raw + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#137333"></span>Готовый товар: ' + types.finished + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#9e9e9e"></span>Наборы: ' + types.sets + '</span>' +

  var blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });

function showTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('tab-' + tabId).classList.add('active');
  var tabs = document.querySelectorAll('.nav-tab');
  var names = ['params', 'export', 'flakons', 'bundles', 'cost', 'plan-cost', 'calc', 'verify'];
  for (var i = 0; i < names.length; i++) {
    if (names[i] === tabId && tabs[i]) tabs[i].classList.add('active');
  }
  if (tabId === 'params' && !STATE.params) loadParamsUI();
  if (tabId === 'flakons' && STATE.flakons.length === 0) loadFlakonsUI();
  if (tabId === 'bundles' && (!STATE.bundleData || !STATE.bundleData.rows || !STATE.bundleData.rows.length)) loadBundlesUI();
  if (tabId === 'plan-cost' && (!STATE.planCost || !STATE.planCost.loaded)) loadPlanCostStateUI(true);
  if (tabId === 'calc') ensureFlakonsState(function() {
    populateCalcSelects();
    syncCalcParamsFromParams(STATE.params || getParamsFromUI());
  });
  if (tabId === 'verify') populateVerifySelect();
  initIcons();
}

function renderExportStats(data) {
  if (!data || !data.rows) return;

  var total = data.rows.length;
  var types = { raw: 0, finished: 0, sets: 0 };
  var withCost = 0;
  var withPrice = 0;

  for (var i = 0; i < data.rows.length; i++) {
    var row = data.rows[i];
    var isSet = normalizeExportValueV3(row[11]);
    var hasRaw = normalizeExportValueV3(row[7]) !== '';
    if (isSet === 'Да') types.sets++;
    else if (!hasRaw) types.finished++;
    else types.raw++;
    if (parseNumberV2(row[14]) !== null && parseNumberV2(row[14]) > 0) withCost++;
    if (parseNumberV2(row[15]) !== null && parseNumberV2(row[15]) > 0) withPrice++;
  }

  var bundleStats = STATE.bundleStats || { loadedBundles: 0 };
  document.getElementById('export-stats').innerHTML =
    '<span class="stat-item"><span class="stat-dot" style="background:#1a73e8"></span>Всего: ' + total + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#c5221f"></span>Сырьё: ' + types.raw + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#137333"></span>Готовый товар: ' + types.finished + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#9e9e9e"></span>Наборы: ' + types.sets + '</span>' +
    '<span class="stat-item"><span class="stat-dot" style="background:#6f5bd3"></span>Загружено комплектаций наборов: ' + (bundleStats.loadedBundles || 0) + '</span>' +
    '<span class="stat-item">|</span>' +
    '<span class="stat-item">Себес 1С: <b>' + withCost + '</b></span>' +
    '<span class="stat-item">Цена пост.: <b>' + withPrice + '</b></span>';
}
