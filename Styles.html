<style>
:root {
  --bg: #f3f5f4;
  --bg-accent: #eef3f0;
  --panel: #ffffff;
  --panel-soft: #fafcfb;
  --panel-muted: #f5f8f6;
  --border: #d7e0da;
  --border-strong: #bfcfc7;
  --text: #1f2925;
  --muted: #5f6b66;
  --muted-strong: #42514b;
  --primary: #1f6b57;
  --primary-strong: #174f41;
  --primary-soft: #e7f3ee;
  --primary-soft-strong: #d4e9df;
  --warning: #b7791f;
  --warning-soft: #fff6e7;
  --danger: #b44132;
  --danger-soft: #fff2ef;
  --success: #217a57;
  --success-soft: #ecf8f1;
  --shadow-sm: 0 1px 2px rgba(20, 37, 30, 0.06);
  --shadow-md: 0 8px 24px rgba(20, 37, 30, 0.08);
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(231, 243, 238, 0.85), transparent 28%),
    linear-gradient(180deg, #f8faf8 0%, var(--bg) 24%, var(--bg-accent) 100%);
  color: var(--text);
  font-size: 13px;
}

body.modal-open {
  overflow: hidden;
}

.navbar {
  background: rgba(255, 255, 255, 0.88);
  color: var(--text);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 18px;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 1px solid rgba(191, 207, 199, 0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 20px rgba(20, 37, 30, 0.06);
}

.nav-brand {
  font-size: 16px;
  font-weight: 700;
  white-space: nowrap;
  color: var(--primary-strong);
  letter-spacing: 0.01em;
}

.nav-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px;
  border-radius: 999px;
  background: var(--panel-muted);
  border: 1px solid var(--border);
  counter-reset: nav-steps;
}

.nav-tab {
  position: relative;
  background: transparent;
  border: 1px solid transparent;
  color: var(--muted);
  padding: 8px 12px 8px 34px;
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
  border-radius: 999px;
  transition: 0.18s ease;
  font-weight: 600;
}

.nav-tab::before {
  counter-increment: nav-steps;
  content: counter(nav-steps);
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  background: var(--panel);
  color: var(--muted-strong);
  border: 1px solid var(--border);
}

.nav-tab:hover {
  color: var(--primary-strong);
  background: rgba(31, 107, 87, 0.06);
}

.nav-tab.active {
  color: var(--primary-strong);
  background: var(--primary-soft);
  border-color: var(--primary-soft-strong);
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(31, 107, 87, 0.04);
}

.nav-tab.active::before {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.container {
  width: 100%;
  max-width: none;
  margin: 0 auto;
  padding: 14px 18px;
}

.card {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(250, 252, 251, 0.98) 100%);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid rgba(215, 224, 218, 0.92);
  box-shadow: var(--shadow-sm);
}

.section-card {
  position: relative;
  overflow: hidden;
}

.section-card::before {
  content: '';
  position: absolute;
  inset: 0 0 auto 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary) 0%, rgba(31, 107, 87, 0.22) 100%);
}

.table-card {
  padding: 12px;
  background: linear-gradient(180deg, rgba(250, 252, 251, 0.98) 0%, rgba(246, 249, 247, 0.98) 100%);
}

.import-table-card::before,
.flakon-table-card::before,
.cost-table-card::before {
  background: linear-gradient(90deg, rgba(31, 107, 87, 0.82) 0%, rgba(31, 107, 87, 0.12) 100%);
}

.section-card > * {
  position: relative;
  z-index: 1;
}

.card h2 {
  font-size: 17px;
  margin-bottom: 6px;
  color: var(--text);
  letter-spacing: -0.01em;
}

.title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.title-row h2 {
  margin-bottom: 0;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.section-head h2 {
  margin-bottom: 0;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.hint {
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.45;
}

.section-card > .hint {
  max-width: 980px;
}

.section-title {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--muted-strong);
}

.actions {
  display: flex;
  gap: 8px;
  margin: 10px 0 8px;
  flex-wrap: wrap;
}

.section-card .actions {
  margin-top: 6px;
}

.btn {
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  font-weight: 700;
  transition: 0.18s ease;
  line-height: 1.2;
  min-height: 34px;
  box-shadow: none;
}

.btn-sm {
  padding: 6px 10px;
  font-size: 11px;
  min-height: 30px;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.btn-primary:hover {
  background: var(--primary-strong);
  border-color: var(--primary-strong);
}

.btn-secondary {
  background: var(--panel-muted);
  color: var(--text);
  border-color: var(--border);
}

.btn-secondary:hover {
  background: #eef3f0;
  border-color: var(--border-strong);
}

.btn-outline {
  background: var(--panel);
  border-color: var(--border);
  color: var(--primary-strong);
}

.btn-outline:hover {
  background: var(--primary-soft);
  border-color: var(--primary-soft-strong);
}

.btn-compact {
  padding: 6px 12px;
  font-size: 12px;
  white-space: nowrap;
}

.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  font-size: 24px;
  line-height: 1;
  background: transparent;
  color: var(--muted);
}

.btn-icon:hover {
  background: var(--panel-muted);
}

.params-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.params-grid.compact {
  margin-bottom: 12px;
}

.params-stack {
  display: grid;
  gap: 12px;
  margin-bottom: 16px;
}

.param-row {
  display: grid;
  grid-template-columns: minmax(220px, 280px) 1fr;
  gap: 16px;
  align-items: start;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-muted) 100%);
}

.params-card .param-main input {
  max-width: 180px;
}

.param-main {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.param-main label {
  font-weight: 600;
  font-size: 12px;
  color: var(--muted);
}

.param-help {
  color: var(--muted-strong);
  line-height: 1.45;
  font-size: 12px;
  padding-top: 2px;
}

.param-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.param-group label {
  font-weight: 600;
  font-size: 12px;
  color: var(--muted);
}

.param-group input,
.param-group select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  background: var(--panel);
  color: var(--text);
}

.param-group input:focus,
.param-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31, 107, 87, 0.14);
}

.search-input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  font-size: 12px;
  background: var(--panel);
}

.search-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31, 107, 87, 0.12);
}

.export-slicers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
  margin-bottom: 10px;
}

.export-slicer {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.export-slicer label {
  font-weight: 600;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.2;
}

.export-slicer select {
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  background: var(--panel);
}

.export-slicer select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31, 107, 87, 0.12);
}

.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  align-items: center;
  padding-top: 2px;
}

.filter-row .search-input {
  margin-bottom: 0;
}

.filter-row select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  min-width: 160px;
  background: var(--panel);
}

.table-wrap {
  width: 100%;
  overflow-x: auto;
  max-height: 68vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--panel);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}

.tabulator-wrap {
  padding: 0;
  overflow: hidden;
}

.tabulator-host {
  width: 100%;
  min-height: 260px;
}

.tabulator {
  border: none !important;
  background: var(--panel) !important;
  color: var(--text) !important;
  font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, sans-serif !important;
  font-size: 12px !important;
}

.tabulator .tabulator-header {
  background: #f4f8f5 !important;
  border-bottom: 1px solid var(--border-strong) !important;
  color: var(--muted-strong) !important;
}

.tabulator .tabulator-header .tabulator-col {
  background: transparent !important;
  border-right: 1px solid #edf1ee !important;
  padding: 0 !important;
}

.tabulator .tabulator-header .tabulator-col .tabulator-col-content {
  padding: 8px 9px !important;
}

.tabulator .tabulator-header .tabulator-col.tabulator-sortable:hover {
  background: var(--primary-soft) !important;
}

.tabulator .tabulator-tableholder {
  background: var(--panel) !important;
}

.tabulator .tabulator-row {
  background: var(--panel) !important;
  border-bottom: 1px solid #edf1ee !important;
}

.tabulator .tabulator-row.tabulator-row-even {
  background: var(--panel) !important;
}

.tabulator .tabulator-row:hover {
  background: rgba(31, 107, 87, 0.02) !important;
}

.tabulator .tabulator-row .tabulator-cell {
  border-right: 1px solid #edf1ee !important;
  padding: 6px 9px !important;
  background: inherit !important;
  color: var(--text) !important;
  vertical-align: middle !important;
}

.tabulator .tabulator-row .tabulator-cell.tabulator-editing {
  border-color: var(--primary) !important;
  box-shadow: inset 0 0 0 1px var(--primary) !important;
}

.tabulator .tabulator-tableholder .tabulator-placeholder .tabulator-placeholder-contents {
  color: var(--muted) !important;
  font-size: 14px !important;
}

.tabulator .tabulator-cell input,
.tabulator .tabulator-cell select,
.tabulator .tabulator-cell textarea {
  width: 100%;
  min-height: 28px;
  padding: 5px 7px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel);
  color: var(--text);
  font-size: 12px;
}

.tabulator .tabulator-cell input:focus,
.tabulator .tabulator-cell select:focus,
.tabulator .tabulator-cell textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31, 107, 87, 0.12);
}

.tabulator .tabulator-frozen {
  background: inherit !important;
}

.tabulator .tabulator-row .tabulator-cell.tabulator-frozen {
  box-shadow: 1px 0 0 #edf1ee;
}

.tabulator .tabulator-header .tabulator-col.tabulator-frozen {
  box-shadow: 1px 0 0 var(--border);
}

.tabulator-cell.num-cell {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.tabulator-cell.zero-value {
  background: var(--danger-soft) !important;
  color: var(--danger) !important;
  font-weight: 600;
}

.tabulator-cell.readonly-cell {
  background: var(--panel-muted) !important;
  color: var(--muted-strong) !important;
}

.tabulator-cell.calc-col-cell {
  background: #eef8f3 !important;
  color: var(--primary-strong) !important;
  font-weight: 600;
}

.tabulator-col.col-total,
.tabulator-cell.col-total {
  background: var(--primary-soft) !important;
}

.tabulator-cell.diff-pos {
  color: var(--danger) !important;
  font-weight: 600;
}

.tabulator-cell.diff-neg {
  color: var(--success) !important;
  font-weight: 600;
}

.tabulator-cell.diff-zero {
  color: var(--muted) !important;
}

.data-table {
  min-width: 100%;
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th {
  background: #f4f8f5;
  padding: 8px 9px;
  text-align: left;
  font-weight: 700;
  position: sticky;
  top: 0;
  z-index: 1;
  border-bottom: 1px solid var(--border-strong);
  white-space: nowrap;
  color: var(--muted-strong);
}

.data-table th.sortable-col {
  cursor: pointer;
  user-select: none;
}

.data-table th.sortable-col:hover {
  background: var(--primary-soft);
}

.data-table th.calc-col-head {
  background: #edf7f2;
  color: var(--primary-strong);
}

.data-table td {
  padding: 6px 9px;
  border-bottom: 1px solid #edf1ee;
  vertical-align: middle;
  background: var(--panel);
  color: var(--text);
}

.readonly-cell {
  background: var(--panel-muted);
  color: var(--muted-strong);
}

.calc-col-cell {
  background: #eef8f3;
  color: var(--primary-strong);
  font-weight: 600;
}

.data-table tr:hover {
  background: rgba(31, 107, 87, 0.02);
}

.data-table th.sticky-col,
.data-table td.sticky-col {
  position: sticky;
}

.data-table th.sticky-col {
  box-shadow: 1px 0 0 var(--border);
}

.data-table td.sticky-col {
  box-shadow: 1px 0 0 #edf1ee;
}

.data-table .num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.data-table td.zero-value {
  background: var(--danger-soft) !important;
  color: var(--danger);
  font-weight: 600;
}

.data-table .editable-cell {
  min-width: 110px;
}

.col-total {
  background: var(--primary-soft) !important;
}

.editable td input,
.rate-input {
  width: 100%;
  min-width: 90px;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-align: right;
  font-size: 12px;
  background: var(--panel);
  color: var(--text);
}

.editable td input:focus,
.rate-input:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 3px rgba(31, 107, 87, 0.12);
}

.rate-input.dirty {
  border-color: var(--warning);
  background: var(--warning-soft);
}

.guide-card {
  margin: 10px 0 14px;
  padding: 12px 14px;
  border: 1px solid #d7e8df;
  border-left: 4px solid var(--primary);
  border-radius: 12px;
  background: linear-gradient(180deg, #f8fcfa 0%, #f2f8f5 100%);
}

.guide-list {
  margin: 0;
  padding-left: 18px;
  color: var(--muted-strong);
  line-height: 1.5;
}

#tab-export .card {
  width: 100%;
}

.diff-pos {
  color: var(--danger);
  font-weight: 600;
}

.diff-neg {
  color: var(--success);
  font-weight: 600;
}

.diff-zero {
  color: var(--muted);
}

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.badge-raw {
  background: var(--danger-soft);
  color: var(--danger);
}

.badge-finished {
  background: var(--success-soft);
  color: var(--success);
}

.badge-flakon {
  background: var(--primary-soft);
  color: var(--primary-strong);
}

.badge-set {
  background: var(--panel-muted);
  color: var(--muted-strong);
}

.stats-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 6px 0 0;
}

.import-card .stats-bar,
.cost-card .stats-bar {
  padding-top: 2px;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  background: var(--panel-muted);
  border: 1px solid var(--border);
}

.stat-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.status {
  padding: 8px 10px;
  font-size: 12px;
  min-height: 36px;
  border-radius: 10px;
  border: 1px solid transparent;
  background: transparent;
}

.section-card .status:empty {
  display: none;
}

.status.success {
  color: var(--success);
  background: var(--success-soft);
  border-color: #cae8d9;
}

.status.error {
  color: var(--danger);
  background: var(--danger-soft);
  border-color: #f0d0cb;
}

.status.info {
  color: var(--primary-strong);
  background: var(--primary-soft);
  border-color: var(--primary-soft-strong);
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(245, 249, 247, 0.86);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.loading-overlay.active {
  display: flex;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #dfe8e3;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.calc-layout {
  display: grid;
  grid-template-columns: minmax(340px, 420px) 1fr;
  gap: 20px;
}

.calc-inputs {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.calc-section {
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-muted) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px;
  display: grid;
  gap: 9px;
}

.calc-result {
  background: linear-gradient(180deg, #f9fbfa 0%, #f4f8f6 100%);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 16px;
  min-height: 240px;
  position: sticky;
  top: 82px;
  align-self: start;
}

.calc-result table {
  width: 100%;
}

.calc-result td {
  padding: 4px 8px;
}

.calc-result .total-row {
  font-weight: 700;
  font-size: 15px;
  border-top: 2px solid #dadce0;
}

.calc-result .diff-row {
  font-size: 12px;
  color: var(--muted);
}

.verify-step {
  padding: 12px 16px;
  border-left: 4px solid var(--primary);
  margin-bottom: 10px;
  background: #f8fbf9;
  border-radius: 0 12px 12px 0;
  border: 1px solid var(--border);
  border-left-width: 4px;
}

.verify-step .step-title {
  font-weight: 600;
  margin-bottom: 4px;
}

.verify-step .step-formula {
  font-family: 'Consolas', monospace;
  font-size: 12px;
  color: var(--muted);
  white-space: pre-wrap;
  margin-bottom: 4px;
}

.verify-step .step-result {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary-strong);
}

.verify-step.step-total {
  border-left-color: var(--success);
}

.verify-step.step-total .step-result {
  color: var(--success);
}

.verify-step.step-diff {
  border-left-color: var(--warning);
}

.rate-toolbar {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.info-chip {
  min-height: 36px;
  padding: 8px 10px;
  border-radius: 10px;
  background: var(--panel-muted);
  border: 1px solid var(--border);
  color: var(--text);
}

.modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(31, 41, 37, 0.34);
  z-index: 200;
  padding: 24px;
}

.modal.active {
  display: flex;
