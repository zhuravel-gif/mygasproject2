<style>
:root {
  --bg: #f8fafc;
  --bg-accent: #f1f5f9;
  --panel: #ffffff;
  --panel-soft: #fafbfc;
  --panel-muted: #f8fafc;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text: #0f172a;
  --muted: #64748b;
  --muted-strong: #475569;
  --primary: #3b82f6;
  --primary-strong: #2563eb;
  --primary-soft: #eff6ff;
  --primary-soft-strong: #dbeafe;
  --warning: #f59e0b;
  --warning-soft: #fffbeb;
  --danger: #ef4444;
  --danger-soft: #fef2f2;
  --success: #22c55e;
  --success-soft: #f0fdf4;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
  --shadow-md: 0 4px 6px rgba(15, 23, 42, 0.04), 0 10px 24px rgba(15, 23, 42, 0.08);
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', 'Segoe UI Variable', 'Segoe UI', -apple-system, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(219, 234, 254, 0.6), transparent 28%),
    linear-gradient(180deg, #f8fafc 0%, var(--bg) 24%, var(--bg-accent) 100%);
  color: var(--text);
  font-size: 13px;
}

body.modal-open {
  overflow: hidden;
}

.navbar {
  background: rgba(255, 255, 255, 0.92);
  color: var(--text);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 18px;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 1px solid rgba(226, 232, 240, 0.9);
  backdrop-filter: blur(12px);
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 4px 12px rgba(15, 23, 42, 0.04);
}

.nav-brand {
  font-size: 16px;
  font-weight: 700;
  white-space: nowrap;
  color: var(--primary-strong);
  letter-spacing: 0.01em;
}

.nav-tabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding: 4px;
  border-radius: 12px;
  background: var(--bg-accent);
  border: 1px solid var(--border);
}

.nav-tab {
  position: relative;
  background: transparent;
  border: 1px solid transparent;
  color: var(--muted);
  padding: 8px 14px;
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
  border-radius: 10px;
  transition: all 0.2s ease;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.nav-tab i[data-lucide] {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
}

.nav-tab:hover {
  color: var(--primary);
  background: rgba(59, 130, 246, 0.06);
}

.nav-tab.active {
  color: var(--primary-strong);
  background: var(--panel);
  border-color: var(--border);
  font-weight: 700;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
}

.container {
  width: 100%;
  max-width: none;
  margin: 0 auto;
  padding: 14px 18px;
}

.card {
  background: var(--panel);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.section-card {
  position: relative;
  overflow: hidden;
}

.section-card::before {
  content: '';
  position: absolute;
  inset: 0 0 auto 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary) 0%, rgba(59, 130, 246, 0.15) 100%);
}

.table-card {
  padding: 14px;
  background: var(--panel);
}

.import-table-card::before,
.flakon-table-card::before,
.cost-table-card::before {
  background: linear-gradient(90deg, var(--primary) 0%, rgba(59, 130, 246, 0.1) 100%);
}

.section-card > * {
  position: relative;
  z-index: 1;
}

.card h2 {
  font-size: 17px;
  margin-bottom: 6px;
  color: var(--text);
  letter-spacing: -0.01em;
}

.title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.title-row h2 {
  margin-bottom: 0;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.section-head h2 {
  margin-bottom: 0;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.hint {
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.45;
}

.section-card > .hint {
  max-width: 980px;
}

.section-title {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--muted-strong);
}

.actions {
  display: flex;
  gap: 8px;
  margin: 10px 0 8px;
  flex-wrap: wrap;
}

.section-card .actions {
  margin-top: 6px;
}

.plan-toolbar {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin: 8px 0 10px;
}

.plan-month-select-group {
  min-width: 260px;
  margin-bottom: 0;
}

.btn {
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  font-weight: 600;
  transition: all 0.2s ease;
  line-height: 1.2;
  min-height: 36px;
  box-shadow: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn i[data-lucide] {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.btn:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
}

.btn-sm {
  padding: 6px 10px;
  font-size: 11px;
  min-height: 30px;
}

.btn-primary {
  background: linear-gradient(180deg, #4f8ff7 0%, var(--primary) 100%);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 1px 2px rgba(59, 130, 246, 0.2);
}

.btn-primary:hover {
  background: linear-gradient(180deg, var(--primary) 0%, var(--primary-strong) 100%);
  border-color: var(--primary-strong);
  transform: translateY(-1px);
  box-shadow: 0 2px 4px rgba(59, 130, 246, 0.25);
}

.btn-primary:active {
  transform: translateY(0);
  box-shadow: 0 1px 2px rgba(59, 130, 246, 0.2);
}

.btn-secondary {
  background: var(--panel);
  color: var(--text);
  border-color: var(--border);
}

.btn-secondary:hover {
  background: var(--bg-accent);
  border-color: var(--border-strong);
  transform: translateY(-1px);
}

.btn-secondary:active {
  transform: translateY(0);
}

.btn-outline {
  background: var(--panel);
  border-color: var(--border);
  color: var(--primary);
}

.btn-outline:hover {
  background: var(--primary-soft);
  border-color: var(--primary-soft-strong);
  transform: translateY(-1px);
}

.btn-outline:active {
  transform: translateY(0);
}

.btn-compact {
  padding: 6px 12px;
  font-size: 12px;
  white-space: nowrap;
}

.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  font-size: 20px;
  line-height: 1;
  background: transparent;
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
}

.btn-icon:hover {
  background: var(--bg-accent);
  color: var(--text);
}

.params-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.params-grid.compact {
  margin-bottom: 12px;
}

.params-stack {
  display: grid;
  gap: 12px;
  margin-bottom: 16px;
}

.param-row {
  display: grid;
  grid-template-columns: minmax(220px, 280px) 1fr;
  gap: 16px;
  align-items: start;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--panel);
  transition: box-shadow 0.2s ease;
}

.param-row:hover {
  box-shadow: var(--shadow-sm);
}

.params-card .param-main input {
  max-width: 180px;
}

.param-main {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.param-main label {
  font-weight: 600;
  font-size: 12px;
  color: var(--muted);
}

.param-help {
  color: var(--muted-strong);
  line-height: 1.45;
  font-size: 12px;
  padding-top: 2px;
}

.param-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.param-group label {
  font-weight: 600;
  font-size: 12px;
  color: var(--muted);
}

.param-group input,
.param-group select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  background: var(--panel);
  color: var(--text);
}

.param-group input:focus,
.param-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

.search-input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  font-size: 12px;
  background: var(--panel);
}

.search-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

.export-slicers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
  margin-bottom: 10px;
}

.export-slicer {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.export-slicer label {
  font-weight: 600;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.2;
}

.export-slicer select {
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  background: var(--panel);
}

.export-slicer select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  align-items: center;
  padding-top: 2px;
}

.filter-row .search-input {
  margin-bottom: 0;
}

.filter-row select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  min-width: 160px;
  background: var(--panel);
}

.table-wrap {
  width: 100%;
  overflow-x: auto;
  max-height: 68vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--panel);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
}

.data-table {
  min-width: 100%;
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th {
  background: var(--bg-accent);
  padding: 8px 9px;
  text-align: left;
  font-weight: 700;
  position: sticky;
  top: 0;
  z-index: 1;
  border-bottom: 1px solid var(--border-strong);
  white-space: nowrap;
  color: var(--muted-strong);
}

.data-table th.sortable-col {
  cursor: pointer;
  user-select: none;
}

.data-table th.sortable-col:hover {
  background: var(--primary-soft);
}

.data-table th.calc-col-head {
  background: #eef4ff;
  color: var(--primary-strong);
}

.data-table td {
  padding: 6px 9px;
  border-bottom: 1px solid #eef1f4;
  vertical-align: middle;
  background: var(--panel);
  color: var(--text);
}

.readonly-cell {
  background: var(--panel-muted);
  color: var(--muted-strong);
}

.calc-col-cell {
  background: #eef4ff;
  color: var(--primary-strong);
  font-weight: 600;
}

.data-table tr:hover {
  background: rgba(59, 130, 246, 0.03);
}

.data-table th.sticky-col,
.data-table td.sticky-col {
  position: sticky;
}

.data-table th.sticky-col {
  box-shadow: 1px 0 0 var(--border);
}

.data-table td.sticky-col {
  box-shadow: 1px 0 0 #eef1f4;
}

.data-table .num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.data-table td.zero-value {
  background: var(--danger-soft) !important;
  color: var(--danger);
  font-weight: 600;
}

.data-table .editable-cell {
  min-width: 110px;
}

.col-total {
  background: var(--primary-soft) !important;
}

.editable td input,
.rate-input {
  width: 100%;
  min-width: 90px;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-align: right;
  font-size: 12px;
  background: var(--panel);
  color: var(--text);
}

.editable td input:focus,
.rate-input:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

.rate-input.dirty {
  border-color: var(--warning);
  background: var(--warning-soft);
}

.guide-card {
  margin: 10px 0 14px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-left: 4px solid var(--primary);
  border-radius: 12px;
  background: linear-gradient(180deg, var(--primary-soft) 0%, #f8fafc 100%);
}

.guide-list {
  margin: 0;
  padding-left: 18px;
  color: var(--muted-strong);
  line-height: 1.5;
}

.bundle-specs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 10px;
}

.bundle-spec-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel);
}

.bundle-spec-item label {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted-strong);
}

.bundle-spec-item select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--panel);
  font-size: 12px;
}

.bundle-spec-select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--panel);
  font-size: 12px;
}

.bundle-active-row td {
  background: var(--primary-soft);
}

.bundle-unmatched-row td {
  background: var(--danger-soft);
}

.bundle-manual-cost {
  background: var(--warning-soft) !important;
  color: var(--warning);
  font-weight: 600;
}

.bundle-missing-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(180, 65, 50, 0.12);
  color: var(--danger);
  font-size: 11px;
  font-weight: 700;
}

.muted-cell {
  color: var(--muted);
  text-align: center;
  padding: 14px 10px !important;
}

#tab-export .card {
  width: 100%;
}

.diff-pos {
  color: var(--danger);
  font-weight: 600;
}

.diff-neg {
  color: var(--success);
  font-weight: 600;
}

.diff-zero {
  color: var(--muted);
}

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.badge-raw {
  background: var(--danger-soft);
  color: var(--danger);
}

.badge-finished {
  background: var(--success-soft);
  color: var(--success);
}

.badge-flakon {
  background: var(--primary-soft);
  color: var(--primary-strong);
}

.badge-set {
  background: var(--panel-muted);
  color: var(--muted-strong);
}

.stats-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 6px 0 0;
}

.import-card .stats-bar,
.cost-card .stats-bar {
  padding-top: 2px;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  background: var(--panel-muted);
  border: 1px solid var(--border);
}

.stat-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.status {
  padding: 8px 10px;
  font-size: 12px;
  min-height: 36px;
  border-radius: 10px;
  border: 1px solid transparent;
  background: transparent;
}

.section-card .status:empty {
  display: none;
}

.status.success {
  color: #15803d;
  background: var(--success-soft);
  border-color: #bbf7d0;
}

.status.error {
  color: #dc2626;
  background: var(--danger-soft);
  border-color: #fecaca;
}

.status.info {
  color: var(--primary-strong);
  background: var(--primary-soft);
  border-color: var(--primary-soft-strong);
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(248, 250, 252, 0.88);
  backdrop-filter: blur(4px);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 16px;
  z-index: 999;
}

.loading-overlay.active {
  display: flex;
}

.loading-overlay p {
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.calc-layout {
  display: grid;
  gap: 18px;
}

.calc-control-board {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: 14px;
}

.calc-group {
  border-radius: 18px;
  border: 1px solid var(--border);
  padding: 16px;
  display: grid;
  gap: 12px;
  background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
  box-shadow: var(--shadow-soft);
}

.calc-group-item {
  grid-column: span 4;
}

.calc-group-raw {
  grid-column: span 4;
  background: linear-gradient(180deg, #fff9f3 0%, #ffffff 100%);
}

.calc-group-flakon {
  grid-column: span 4;
  background: linear-gradient(180deg, #f5fbff 0%, #ffffff 100%);
}

.calc-group-rates {
  grid-column: 1 / -1;
  background: linear-gradient(180deg, #f7f8fc 0%, #ffffff 100%);
}

.calc-group-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.calc-group-head h3 {
  margin: 0;
  font-size: 17px;
}

.calc-group-kicker {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 800;
  color: var(--muted-strong);
  background: rgba(15, 23, 42, 0.06);
}

.calc-grid {
  display: grid;
  gap: 10px 12px;
}

.calc-grid-item,
.calc-grid-raw,
.calc-grid-flakon {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.calc-grid-rates {
  grid-template-columns: repeat(6, minmax(0, 1fr));
}

.calc-field {
  margin-bottom: 0;
}

.calc-field-wide {
  grid-column: 1 / -1;
}

.calc-runbar {
  margin: 10px 0 18px;
}

.calc-run-btn {
  width: 100%;
  justify-content: center;
  min-height: 44px;
  border-radius: 14px;
  background: linear-gradient(180deg, #16a34a 0%, #15803d 100%);
  border: 1px solid #15803d;
  color: #fff;
  font-weight: 800;
  letter-spacing: 0.01em;
}

.calc-run-btn:hover {
  background: linear-gradient(180deg, #22c55e 0%, #15803d 100%);
}

.calc-run-btn.is-dirty {
  box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.16);
}

.calc-run-btn.is-busy {
  opacity: 0.8;
}

.calc-output-stack {
  display: grid;
  gap: 14px;
}

.calc-panel {
  border-radius: 18px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  box-shadow: var(--shadow-soft);
}

.calc-result {
  padding: 16px;
  min-height: 240px;
}

.calc-result table {
  width: 100%;
  border-collapse: collapse;
}

.calc-result td {
  padding: 7px 8px;
  border-bottom: 1px solid var(--border);
}

.calc-result .total-row {
  font-weight: 700;
  font-size: 15px;
}

.calc-result .diff-row {
  font-size: 12px;
  color: var(--muted);
}

.calc-result .diff-row td {
  border-bottom: none;
}

.calc-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.calc-summary-card {
  padding: 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
}

.calc-summary-card strong {
  display: block;
  margin-top: 6px;
  font-size: 22px;
